<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Hearts</title>
<meta name="description" content="A digital home for Rashmi and Sharath">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --midnight:#0a0a14;--deep:#0f0f1e;--surface:rgba(255,255,255,0.03);
  --surface-hover:rgba(255,255,255,0.06);--golden:#c8a855;--golden-dim:rgba(200,168,85,0.3);
  --golden-glow:rgba(200,168,85,0.12);--warm:#f0e6d2;--text:#e8e0d4;
  --text-secondary:rgba(240,230,210,0.45);--green:#4a7c59;--green-dim:rgba(74,124,89,0.25);
  --brown:#3d2b1f;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);
  --font:'Cormorant Garamond','Georgia',serif;--font-ui:'Inter',-apple-system,sans-serif
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--midnight);color:var(--text);font-family:var(--font-ui)}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#stars{z-index:0}
#fireflies{z-index:3}
::selection{background:var(--golden);color:var(--midnight)}

/* ── Entrance ── */
#entrance{position:fixed;inset:0;z-index:100;background:var(--midnight);display:flex;align-items:center;justify-content:center;transition:opacity 1.8s ease,visibility 1.8s}
#entrance.hidden{opacity:0;visibility:hidden;pointer-events:none}
.entrance-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,85,0.08) 0%,transparent 70%);animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
.entrance-content{text-align:center;position:relative;z-index:1}
.entrance-content .names{display:flex;align-items:baseline;justify-content:center;gap:16px;margin-bottom:16px}
.entrance-content .name{font-family:var(--font);font-size:clamp(36px,7vw,72px);font-weight:300;letter-spacing:0.02em;opacity:0;transform:translateY(20px);transition:opacity 1.2s ease,transform 1.2s ease}
.entrance-content .name.show{opacity:1;transform:translateY(0)}
.entrance-content .ampersand{font-family:var(--font);font-size:clamp(24px,4vw,40px);font-weight:300;color:var(--golden);opacity:0;transition:opacity 1s ease}
.entrance-content .ampersand.show{opacity:0.7}
.entrance-content .date{font-family:var(--font-ui);font-size:clamp(11px,1.5vw,14px);font-weight:300;color:var(--text-secondary);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:32px;opacity:0;transition:opacity 1.2s ease}
.entrance-content .date.show{opacity:1}
.entrance-content .quote{font-family:var(--font);font-size:clamp(16px,2.5vw,24px);font-style:italic;font-weight:300;color:var(--golden-dim);opacity:0;transition:opacity 1.5s ease;max-width:400px;margin:0 auto;line-height:1.6}
.entrance-content .quote.show{opacity:1}
.enter-btn{margin-top:48px;padding:12px 32px;border:1px solid var(--glass-border);border-radius:40px;background:var(--glass);color:var(--text-secondary);font-family:var(--font-ui);font-size:13px;font-weight:400;cursor:pointer;letter-spacing:0.08em;opacity:0;transition:all 0.6s ease;backdrop-filter:blur(20px)}
.enter-btn.show{opacity:1}
.enter-btn:hover{border-color:var(--golden-dim);color:var(--golden);background:rgba(200,168,85,0.06)}

/* ── World ── */
#world{position:fixed;inset:0;z-index:1;opacity:0;transition:opacity 2s ease 0.5s;overflow:hidden}
#world.show{opacity:1}

/* ── Moon ── */
#moon{position:absolute;top:8%;right:12%;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f5ecd7,#e8dcc0,#c8b896);box-shadow:0 0 40px rgba(200,168,85,0.2),0 0 80px rgba(200,168,85,0.1),0 0 120px rgba(200,168,85,0.05);animation:moonFloat 8s ease-in-out infinite}
@keyframes moonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.moon-crater{position:absolute;border-radius:50%;background:rgba(0,0,0,0.06)}

/* ── Tree ── */
#tree{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);width:clamp(280px,40vw,420px);height:auto;z-index:2}
#tree svg{width:100%;height:auto;filter:drop-shadow(0 0 30px rgba(74,124,89,0.15))}
.tree-sway{animation:treeSway 6s ease-in-out infinite;transform-origin:bottom center}
@keyframes treeSway{0%,100%{transform:rotate(0deg)}25%{transform:rotate(0.5deg)}75%{transform:rotate(-0.5deg)}}
.leaf{animation:leafSway 3s ease-in-out infinite}
@keyframes leafSway{0%,100%{transform:translate(0,0)}50%{transform:translate(2px,-1px)}}

/* ── Ground ── */
#ground{position:absolute;bottom:0;left:0;right:0;height:18%;background:linear-gradient(to top,#0a120d 0%,#0d1a12 40%,transparent 100%);z-index:1}
.ground-detail{position:absolute;bottom:0;left:0;right:0;height:100%}

/* ── Bench ── */
#bench{position:absolute;bottom:14%;right:18%;z-index:2;width:clamp(100px,14vw,160px)}
#bench svg{width:100%;height:auto;opacity:0.85}
.presence{position:absolute;opacity:0;transition:opacity 1.5s ease}
.presence.visible{opacity:1}
.presence-mug{bottom:65%;left:10%}
.presence-book{bottom:65%;right:10%}

/* ── Flowers ── */
.flower{position:absolute;z-index:2;opacity:0;transition:opacity 1s ease,transform 1s ease;transform:scale(0.5)}
.flower.visible{opacity:0.8;transform:scale(1)}
.flower svg{width:100%;height:auto}
.flower-sway{animation:flowerSway 4s ease-in-out infinite}
@keyframes flowerSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

/* ── Navigation ── */
#mainNav{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:4px;padding:6px;border-radius:40px;background:rgba(15,15,30,0.7);backdrop-filter:blur(24px);border:1px solid var(--glass-border);opacity:0;transition:opacity 1s ease}
#mainNav.show{opacity:1}
.nav-btn{padding:10px 20px;border:none;border-radius:30px;background:transparent;color:var(--text-secondary);font-family:var(--font-ui);font-size:12px;font-weight:400;cursor:pointer;transition:all 0.4s ease;letter-spacing:0.04em;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:var(--glass)}
.nav-btn.active{color:var(--golden);background:rgba(200,168,85,0.1)}
.nav-btn svg{width:14px;height:14px;vertical-align:-2px;margin-right:4px;stroke:currentColor;fill:none;stroke-width:1.5}

/* ── Letter Modal ── */
#letterModal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(5,5,10,0.85);backdrop-filter:blur(12px);opacity:0;visibility:hidden;transition:opacity 0.5s ease,visibility 0.5s}
#letterModal.open{opacity:1;visibility:visible}
.letter-paper{width:min(480px,90vw);background:linear-gradient(135deg,rgba(30,28,24,0.95),rgba(25,23,20,0.98));border:1px solid var(--glass-border);border-radius:16px;padding:40px;position:relative;transform:translateY(20px);transition:transform 0.5s ease}
#letterModal.open .letter-paper{transform:translateY(0)}
.letter-paper::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--golden-dim),transparent);border-radius:16px 16px 0 0}
.letter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.letter-header h3{font-family:var(--font);font-size:22px;font-weight:400;color:var(--golden)}
.letter-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.3s}
.letter-close:hover{border-color:var(--golden-dim);color:var(--golden)}
.letter-to{font-family:var(--font-ui);font-size:11px;color:var(--text-secondary);margin-bottom:16px;letter-spacing:0.06em}
.letter-textarea{width:100%;min-height:200px;border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:18px;line-height:1.8;resize:none;outline:none}
.letter-textarea::placeholder{color:rgba(240,230,210,0.2);font-style:italic}
.letter-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--glass-border)}
.letter-count{font-size:11px;color:var(--text-secondary);letter-spacing:0.04em}
.letter-send{padding:10px 24px;border:1px solid var(--golden-dim);border-radius:30px;background:rgba(200,168,85,0.08);color:var(--golden);font-family:var(--font-ui);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.3s;letter-spacing:0.04em}
.letter-send:hover{background:rgba(200,168,85,0.15);border-color:var(--golden)}
.letter-sent{text-align:center;padding:40px 0}
.letter-sent .check{font-size:48px;margin-bottom:16px;animation:checkPop 0.5s ease}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.letter-sent p{font-family:var(--font);font-size:18px;color:var(--golden);font-style:italic}

/* ── Constellation Modal ── */
#constellationModal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(5,5,10,0.9);backdrop-filter:blur(8px);opacity:0;visibility:hidden;transition:opacity 0.5s ease,visibility 0.5s}
#constellationModal.open{opacity:1;visibility:visible}
.memory-card{width:min(420px,90vw);background:linear-gradient(135deg,rgba(30,28,24,0.95),rgba(25,23,20,0.98));border:1px solid var(--glass-border);border-radius:16px;padding:32px;position:relative;transform:scale(0.95);transition:transform 0.4s ease}
#constellationModal.open .memory-card{transform:scale(1)}
.memory-card .mem-date{font-size:11px;color:var(--golden);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.memory-card .mem-title{font-family:var(--font);font-size:24px;font-weight:400;margin-bottom:12px;line-height:1.3}
.memory-card .mem-text{font-size:14px;color:var(--text-secondary);line-height:1.7}
.memory-card .mem-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}

/* ── Info Overlay ── */
#infoPanel{position:fixed;top:24px;left:24px;z-index:15;opacity:0;transition:opacity 1s ease}
#infoPanel.show{opacity:1}
.info-names{font-family:var(--font);font-size:clamp(20px,3vw,32px);font-weight:300;color:var(--warm);letter-spacing:0.02em}
.info-sub{font-size:11px;color:var(--text-secondary);letter-spacing:0.06em;margin-top:4px}
.info-time{position:fixed;top:24px;right:24px;z-index:15;font-size:11px;color:var(--text-secondary);letter-spacing:0.06em;opacity:0;transition:opacity 1s ease}
.info-time.show{opacity:1}
.info-time .city{display:block;text-align:right;margin-bottom:2px}
.info-time .clock{font-family:var(--font);font-size:18px;color:var(--text);font-weight:300}

/* ── Garden Info ── */
#gardenInfo{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:15;text-align:center;opacity:0;transition:opacity 1s ease}
#gardenInfo.show{opacity:1}
.garden-label{font-family:var(--font);font-size:clamp(14px,2vw,18px);font-weight:300;color:var(--text-secondary);letter-spacing:0.04em}
.garden-sublabel{font-size:11px;color:var(--text-secondary);opacity:0.5;margin-top:4px;letter-spacing:0.06em}

/* ── Thinking of You ── */
#thinkBtn{position:fixed;bottom:90px;right:32px;z-index:15;width:48px;height:48px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(20px);color:var(--golden);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.4s ease;font-size:18px}
#thinkBtn.show{opacity:0.7}
#thinkBtn:hover{opacity:1;border-color:var(--golden-dim);transform:scale(1.1)}
#thinkBtn.pulse{animation:thinkPulse 1s ease}
@keyframes thinkPulse{0%{transform:scale(1)}30%{transform:scale(1.3);box-shadow:0 0 30px rgba(200,168,85,0.3)}100%{transform:scale(1)}}

/* ── Responsive ── */
@media(max-width:768px){
  #tree{bottom:10%;width:260px}
  #bench{bottom:12%;right:10%;width:100px}
  #mainNav{bottom:20px;gap:2px;padding:4px}
  .nav-btn{padding:8px 14px;font-size:11px}
  .nav-btn span{display:none}
  .nav-btn svg{margin-right:0}
  #moon{width:40px;height:40px;top:10%;right:8%}
  #infoPanel{top:16px;left:16px}
  .info-time{top:16px;right:16px}
  #thinkBtn{bottom:80px;right:20px;width:40px;height:40px}
}
@media(max-width:480px){
  #tree{width:220px;bottom:8%}
  #bench{width:80px;right:8%}
  .entrance-content .names{flex-direction:column;gap:4px}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="fireflies"></canvas>

<!-- Entrance -->
<div id="entrance">
  <div class="entrance-glow"></div>
  <div class="entrance-content">
    <div class="names">
      <span class="name" id="nameR">Rashmi</span>
      <span class="ampersand" id="amp">&amp;</span>
      <span class="name" id="nameS">Sharath</span>
    </div>
    <div class="date" id="eDate">23 May 2025 · Coorg, Karnataka</div>
    <div class="quote" id="eQuote">"God put us in each other's hands."</div>
    <button class="enter-btn" id="enterBtn" onclick="enterWorld()">Enter our home</button>
  </div>
</div>

<!-- World -->
<div id="world">
  <div id="moon">
    <div class="moon-crater" style="width:8px;height:8px;top:18px;left:20px"></div>
    <div class="moon-crater" style="width:5px;height:5px;top:32px;left:35px"></div>
    <div class="moon-crater" style="width:6px;height:6px;top:14px;left:38px"></div>
  </div>

  <div id="tree">
    <svg viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="leafGlow" cx="50%" cy="40%"><stop offset="0%" stop-color="rgba(200,168,85,0.15)"/><stop offset="100%" stop-color="transparent"/></radialGradient>
        <filter id="softGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g class="tree-sway">
        <!-- Roots -->
        <path d="M200,460 Q180,455 160,460 Q140,465 130,460" stroke="#2d1b0f" stroke-width="3" fill="none" opacity="0.4"/>
        <path d="M200,460 Q220,455 240,460 Q260,465 270,460" stroke="#2d1b0f" stroke-width="3" fill="none" opacity="0.4"/>
        <!-- Trunk -->
        <path d="M192,460 C190,430 188,400 190,370 C192,340 195,310 198,280 C200,260 200,240 200,220" stroke="none" fill="#3d2b1f"/>
        <path d="M208,460 C210,430 212,400 210,370 C208,340 205,310 202,280 C200,260 200,240 200,220" stroke="none" fill="#3d2b1f"/>
        <path d="M192,460 C190,430 188,400 190,370 C192,340 195,310 198,280 C200,260 200,240 200,220 L200,220 C200,240 200,260 202,280 C205,310 208,340 210,370 C212,400 210,430 208,460 Z" fill="#3d2b1f"/>
        <!-- Branches -->
        <path d="M200,250 C180,235 155,225 130,220" stroke="#3d2b1f" stroke-width="7" fill="none" stroke-linecap="round"/>
        <path d="M200,250 C220,232 250,222 275,218" stroke="#3d2b1f" stroke-width="7" fill="none" stroke-linecap="round"/>
        <path d="M200,225 C175,210 145,200 115,195" stroke="#3d2b1f" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M200,225 C225,208 260,195 290,190" stroke="#3d2b1f" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M200,210 C185,195 165,180 145,165" stroke="#3d2b1f" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M200,210 C215,192 240,175 260,160" stroke="#3d2b1f" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M200,200 C195,180 185,160 175,140" stroke="#3d2b1f" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M200,200 C205,178 218,155 230,135" stroke="#3d2b1f" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Leaf clusters -->
        <g filter="url(#softGlow)">
          <ellipse cx="130" cy="215" rx="38" ry="28" fill="#4a7c59" opacity="0.75" class="leaf" style="animation-delay:0s"/>
          <ellipse cx="105" cy="200" rx="32" ry="24" fill="#3a6c49" opacity="0.7" class="leaf" style="animation-delay:0.3s"/>
          <ellipse cx="155" cy="195" rx="30" ry="22" fill="#5a8c69" opacity="0.65" class="leaf" style="animation-delay:0.6s"/>
          <ellipse cx="275" cy="212" rx="40" ry="28" fill="#4a7c59" opacity="0.75" class="leaf" style="animation-delay:0.2s"/>
          <ellipse cx="295" cy="198" rx="30" ry="22" fill="#3a6c49" opacity="0.7" class="leaf" style="animation-delay:0.5s"/>
          <ellipse cx="255" cy="192" rx="28" ry="20" fill="#5a8c69" opacity="0.65" class="leaf" style="animation-delay:0.8s"/>
          <ellipse cx="115" cy="190" rx="35" ry="25" fill="#4a7c59" opacity="0.7" class="leaf" style="animation-delay:0.4s"/>
          <ellipse cx="90" cy="175" rx="28" ry="20" fill="#3a6c49" opacity="0.65" class="leaf" style="animation-delay:0.7s"/>
          <ellipse cx="140" cy="172" rx="26" ry="18" fill="#5a8c69" opacity="0.6" class="leaf" style="animation-delay:1s"/>
          <ellipse cx="290" cy="185" rx="34" ry="24" fill="#4a7c59" opacity="0.7" class="leaf" style="animation-delay:0.3s"/>
          <ellipse cx="310" cy="172" rx="26" ry="18" fill="#3a6c49" opacity="0.65" class="leaf" style="animation-delay:0.6s"/>
          <ellipse cx="265" cy="170" rx="24" ry="16" fill="#5a8c69" opacity="0.6" class="leaf" style="animation-delay:0.9s"/>
          <ellipse cx="145" cy="160" rx="30" ry="22" fill="#4a7c59" opacity="0.7" class="leaf" style="animation-delay:0.2s"/>
          <ellipse cx="260" cy="155" rx="32" ry="22" fill="#4a7c59" opacity="0.7" class="leaf" style="animation-delay:0.5s"/>
          <ellipse cx="175" cy="135" rx="25" ry="18" fill="#5a8c69" opacity="0.65" class="leaf" style="animation-delay:0.8s"/>
          <ellipse cx="230" cy="130" rx="28" ry="20" fill="#4a7c59" opacity="0.7" class="leaf" style="animation-delay:0.1s"/>
          <ellipse cx="200" cy="155" rx="35" ry="26" fill="#3a6c49" opacity="0.6" class="leaf" style="animation-delay:0.4s"/>
          <ellipse cx="200" cy="120" rx="30" ry="22" fill="#4a7c59" opacity="0.55" class="leaf" style="animation-delay:0.7s"/>
        </g>
        <!-- Golden highlights on leaves -->
        <g opacity="0.4">
          <circle cx="125" cy="210" r="4" fill="var(--golden)" class="leaf" style="animation-delay:1.2s"/>
          <circle cx="280" cy="208" r="3" fill="var(--golden)" class="leaf" style="animation-delay:0.8s"/>
          <circle cx="170" cy="145" r="3" fill="var(--golden)" class="leaf" style="animation-delay:1.5s"/>
          <circle cx="235" cy="140" r="4" fill="var(--golden)" class="leaf" style="animation-delay:1.1s"/>
          <circle cx="200" cy="125" r="3" fill="var(--golden)" class="leaf" style="animation-delay:0.5s"/>
        </g>
      </g>
    </svg>
  </div>

  <div id="ground"></div>

  <div id="bench">
    <svg viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Bench legs -->
      <rect x="20" y="50" width="6" height="30" rx="2" fill="#5a4030"/>
      <rect x="134" y="50" width="6" height="30" rx="2" fill="#5a4030"/>
      <!-- Bench seat -->
      <rect x="10" y="44" width="140" height="10" rx="3" fill="#6b5040"/>
      <rect x="10" y="44" width="140" height="3" rx="2" fill="#7a6050" opacity="0.5"/>
      <!-- Bench back -->
      <rect x="14" y="20" width="132" height="8" rx="2" fill="#5a4030"/>
      <rect x="14" y="12" width="132" height="8" rx="2" fill="#5a4030"/>
      <!-- Back supports -->
      <rect x="18" y="20" width="4" height="24" rx="1" fill="#4a3525"/>
      <rect x="138" y="20" width="4" height="24" rx="1" fill="#4a3525"/>
    </svg>
    <!-- Sharath's coffee mug -->
    <div class="presence presence-mug" id="presenceMug">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="8" width="14" height="12" rx="2" fill="#6b5040" stroke="#8a7060" stroke-width="0.5"/>
        <path d="M17,10 Q21,10 21,14 Q21,18 17,18" stroke="#8a7060" stroke-width="1" fill="none"/>
        <path d="M7,7 Q8,4 9,7" stroke="rgba(200,168,85,0.3)" stroke-width="0.8" fill="none"/>
        <path d="M10,6 Q11,3 12,6" stroke="rgba(200,168,85,0.2)" stroke-width="0.8" fill="none"/>
      </svg>
    </div>
    <!-- Rashmi's book -->
    <div class="presence presence-book" id="presenceBook">
      <svg width="24" height="20" viewBox="0 0 24 20" fill="none">
        <rect x="2" y="2" width="20" height="16" rx="1" fill="#8a7060" opacity="0.8"/>
        <rect x="3" y="3" width="8" height="14" rx="0.5" fill="#a08a70"/>
        <rect x="13" y="3" width="8" height="14" rx="0.5" fill="#a08a70"/>
        <line x1="12" y1="3" x2="12" y2="17" stroke="#6b5040" stroke-width="0.5"/>
      </svg>
    </div>
  </div>

  <!-- Flowers placed around the garden -->
  <div class="flower" id="f1" style="bottom:13%;left:28%;width:18px"><svg viewBox="0 0 20 30"><circle cx="10" cy="8" r="4" fill="#c8a855" opacity="0.7"/><circle cx="6" cy="10" r="3.5" fill="#d4a847" opacity="0.6"/><circle cx="14" cy="10" r="3.5" fill="#d4a847" opacity="0.6"/><circle cx="8" cy="14" r="3" fill="#c8a855" opacity="0.5"/><circle cx="12" cy="14" r="3" fill="#c8a855" opacity="0.5"/><line x1="10" y1="15" x2="10" y2="28" stroke="#4a7c59" stroke-width="1.5" class="flower-sway"/></svg></div>
  <div class="flower" id="f2" style="bottom:12%;left:35%;width:14px"><svg viewBox="0 0 20 30"><circle cx="10" cy="8" r="3.5" fill="#e8d4a0" opacity="0.6"/><circle cx="6" cy="10" r="3" fill="#dfc07a" opacity="0.5"/><circle cx="14" cy="10" r="3" fill="#dfc07a" opacity="0.5"/><line x1="10" y1="13" x2="10" y2="28" stroke="#4a7c59" stroke-width="1.2" class="flower-sway" style="animation-delay:0.5s"/></svg></div>
  <div class="flower" id="f3" style="bottom:14%;right:30%;width:16px"><svg viewBox="0 0 20 30"><circle cx="10" cy="8" r="4" fill="#c8a855" opacity="0.65"/><circle cx="6" cy="10" r="3" fill="#d4a847" opacity="0.55"/><circle cx="14" cy="10" r="3" fill="#d4a847" opacity="0.55"/><circle cx="10" cy="13" r="3" fill="#c8a855" opacity="0.45"/><line x1="10" y1="14" x2="10" y2="28" stroke="#4a7c59" stroke-width="1.5" class="flower-sway" style="animation-delay:1s"/></svg></div>
  <div class="flower" id="f4" style="bottom:11%;left:42%;width:12px"><svg viewBox="0 0 20 30"><circle cx="10" cy="9" r="3" fill="#f0e6d2" opacity="0.5"/><circle cx="7" cy="11" r="2.5" fill="#e8d4a0" opacity="0.4"/><circle cx="13" cy="11" r="2.5" fill="#e8d4a0" opacity="0.4"/><line x1="10" y1="13" x2="10" y2="28" stroke="#4a7c59" stroke-width="1" class="flower-sway" style="animation-delay:1.5s"/></svg></div>
  <div class="flower" id="f5" style="bottom:13%;right:22%;width:15px"><svg viewBox="0 0 20 30"><circle cx="10" cy="8" r="3.5" fill="#c8a855" opacity="0.6"/><circle cx="6" cy="10" r="3" fill="#dfc07a" opacity="0.5"/><circle cx="14" cy="10" r="3" fill="#dfc07a" opacity="0.5"/><line x1="10" y1="12" x2="10" y2="28" stroke="#4a7c59" stroke-width="1.2" class="flower-sway" style="animation-delay:0.8s"/></svg></div>
</div>

<!-- Info -->
<div id="infoPanel">
  <div class="info-names">Rashmi & Sharath</div>
  <div class="info-sub">Our Garden</div>
</div>
<div class="info-time" id="infoTime">
  <div class="city" id="cityLabel">Dublin</div>
  <div class="clock" id="clockDisplay">--:--</div>
</div>

<!-- Garden Info -->
<div id="gardenInfo">
  <div class="garden-label">Our Garden</div>
  <div class="garden-sublabel">A place that grows with love</div>
</div>

<!-- Thinking of You -->
<button id="thinkBtn" onclick="thinkOfYou()" title="Thinking of you">&#9825;</button>

<!-- Navigation -->
<nav id="mainNav">
  <button class="nav-btn active" onclick="switchSection('garden')"><svg viewBox="0 0 24 24"><path d="M12 22c4-4 8-7 8-12a8 8 0 0 0-16 0c0 5 4 8 8 12z"/></svg><span>Garden</span></button>
  <button class="nav-btn" onclick="switchSection('letter')"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 6 10-6"/></svg><span>Letter</span></button>
  <button class="nav-btn" onclick="switchSection('memories')"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>Stars</span></button>
  <button class="nav-btn" onclick="switchSection('story')"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Story</span></button>
</nav>

<!-- Letter Modal -->
<div id="letterModal">
  <div class="letter-paper">
    <div class="letter-header">
      <h3>Write a Letter</h3>
      <button class="letter-close" onclick="closeLetter()">&#10005;</button>
    </div>
    <div class="letter-to">To: <span id="letterRecipient">Sharath</span></div>
    <div id="letterForm">
      <textarea class="letter-textarea" id="letterText" placeholder="Write something from the heart..." maxlength="1500"></textarea>
      <div class="letter-footer">
        <span class="letter-count" id="letterCount">0 / 250 words</span>
        <button class="letter-send" onclick="sendLetter()">Send with love</button>
      </div>
    </div>
    <div id="letterSent" class="letter-sent" style="display:none">
      <div class="check">&#10003;</div>
      <p>Your letter has been sent with love.</p>
    </div>
  </div>
</div>

<!-- Constellation Modal -->
<div id="constellationModal">
  <div class="memory-card">
    <button class="mem-close" onclick="closeConstellation()">&#10005;</button>
    <div class="mem-date" id="memDate"></div>
    <div class="mem-title" id="memTitle"></div>
    <div class="mem-text" id="memText"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   PARALLEL HEARTS — A Digital Home
   ═══════════════════════════════════════════════════════════ */

const STATE = {
  entered: false,
  section: 'garden',
  letterRecipient: 'Sharath',
  memories: [
    { date:'23 May 2025', title:'The Day We Promised', text:'In the misty hills of Coorg, surrounded by family and the scent of coffee blossoms, we promised forever. The rain held back just long enough for us to say our vows.' },
    { date:'2 January 2026', title:'The Goodbye That Wasn\'t', text:'Dublin airport. Two cups of chai and a thousand unspoken words. You held my hand and said "See you soon." Not goodbye. Never goodbye.' },
    { date:'14 February 2026', title:'Apart But Never Alone', text:'Valentine\'s Day, 5,000 miles apart. You sent a voice note at midnight Dublin time. I listened to it six times before sleeping.' },
    { date:'23 May 2026', title:'One Year', text:'One year of marriage. One year of choosing each other every day, across time zones and ocean waves. The tree in our garden grew another ring.' },
    { date:'15 March 2026', title:'The Video Call Sunset', text:'We watched the sunset together over video — you from your window in Dublin, me from the balcony in Bangalore. Same sun. Two cities. One heart.' },
  ]
};

/* ── Stars Canvas ── */
const starsCanvas = document.getElementById('stars');
const starsCtx = starsCanvas.getContext('2d');
let stars = [];

function initStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((starsCanvas.width * starsCanvas.height) / 3000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * starsCanvas.width,
      y: Math.random() * starsCanvas.height * 0.7,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.8 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  for (const s of stars) {
    const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
    starsCtx.beginPath();
    starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(240,230,210,${a})`;
    starsCtx.fill();
    if (s.r > 1.2) {
      starsCtx.beginPath();
      starsCtx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
      starsCtx.fillStyle = `rgba(200,168,85,${a * 0.08})`;
      starsCtx.fill();
    }
  }
}

/* ── Fireflies Canvas ── */
const ffCanvas = document.getElementById('fireflies');
const ffCtx = ffCanvas.getContext('2d');
let fireflies = [];

function initFireflies() {
  ffCanvas.width = window.innerWidth;
  ffCanvas.height = window.innerHeight;
  fireflies = [];
  const count = Math.floor(window.innerWidth / 40);
  for (let i = 0; i < count; i++) {
    fireflies.push({
      x: Math.random() * ffCanvas.width,
      y: ffCanvas.height * 0.4 + Math.random() * ffCanvas.height * 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.2,
      alpha: Math.random() * 0.5 + 0.2,
      pulse: Math.random() * Math.PI * 2,
      size: Math.random() * 1.5 + 1
    });
  }
}

function drawFireflies(t) {
  ffCtx.clearRect(0, 0, ffCanvas.width, ffCanvas.height);
  for (const f of fireflies) {
    f.x += f.vx + Math.sin(t * 0.0005 + f.pulse) * 0.15;
    f.y += f.vy + Math.cos(t * 0.0007 + f.pulse) * 0.1;
    if (f.x < -10) f.x = ffCanvas.width + 10;
    if (f.x > ffCanvas.width + 10) f.x = -10;
    if (f.y < ffCanvas.height * 0.3) f.vy += 0.01;
    if (f.y > ffCanvas.height) f.y = ffCanvas.height * 0.4;
    const a = f.alpha * (0.4 + 0.6 * Math.sin(t * 0.003 + f.pulse));
    ffCtx.beginPath();
    ffCtx.arc(f.x, f.y, f.size * 4, 0, Math.PI * 2);
    ffCtx.fillStyle = `rgba(200,168,85,${a * 0.12})`;
    ffCtx.fill();
    ffCtx.beginPath();
    ffCtx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ffCtx.fillStyle = `rgba(200,168,85,${a})`;
    ffCtx.fill();
  }
}

/* ── Animation Loop ── */
function animate(t) {
  drawStars(t);
  if (STATE.entered) drawFireflies(t);
  requestAnimationFrame(animate);
}

/* ── Entrance ── */
function runEntrance() {
  setTimeout(() => document.getElementById('nameR').classList.add('show'), 800);
  setTimeout(() => document.getElementById('amp').classList.add('show'), 1800);
  setTimeout(() => document.getElementById('nameS').classList.add('show'), 2400);
  setTimeout(() => document.getElementById('eDate').classList.add('show'), 3400);
  setTimeout(() => document.getElementById('eQuote').classList.add('show'), 4400);
  setTimeout(() => document.getElementById('enterBtn').classList.add('show'), 5800);
}

function enterWorld() {
  STATE.entered = true;
  document.getElementById('entrance').classList.add('hidden');
  document.getElementById('world').classList.add('show');
  setTimeout(() => {
    document.getElementById('mainNav').classList.add('show');
    document.getElementById('infoPanel').classList.add('show');
    document.getElementById('infoTime').classList.add('show');
    document.getElementById('gardenInfo').classList.add('show');
    document.getElementById('thinkBtn').classList.add('show');
    showFlowers();
    showPresence();
  }, 800);
}

/* ── Flowers ── */
function showFlowers() {
  const flowers = document.querySelectorAll('.flower');
  flowers.forEach((f, i) => {
    setTimeout(() => f.classList.add('visible'), 400 + i * 300);
  });
}

/* ── Presence ── */
function showPresence() {
  setTimeout(() => document.getElementById('presenceMug').classList.add('visible'), 2000);
  setTimeout(() => document.getElementById('presenceBook').classList.add('visible'), 2500);
}

/* ── Clock ── */
function updateClock() {
  const now = new Date();
  const dublin = new Intl.DateTimeFormat('en-IE', { timeZone:'Europe/Dublin', hour:'2-digit', minute:'2-digit', hour12:false }).format(now);
  const bangalore = new Intl.DateTimeFormat('en-IN', { timeZone:'Asia/Kolkata', hour:'2-digit', minute:'2-digit', hour12:false }).format(now);
  const dublinDate = new Intl.DateTimeFormat('en-IE', { timeZone:'Europe/Dublin', weekday:'short', day:'numeric', month:'short' }).format(now);
  document.getElementById('clockDisplay').textContent = dublin;
  document.getElementById('cityLabel').textContent = `Dublin ${dublinDate} · Bangalore ${bangalore}`;
}

/* ── Navigation ── */
function switchSection(section) {
  STATE.section = section;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  if (section === 'letter') {
    document.getElementById('letterModal').classList.add('open');
    document.getElementById('letterText').focus();
  } else if (section === 'memories') {
    showConstellationStars();
  } else if (section === 'story') {
    showStoryPage();
  }
}

/* ── Letter ── */
document.getElementById('letterText').addEventListener('input', function() {
  const words = this.value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('letterCount').textContent = `${words} / 250 words`;
  if (words > 250) {
    document.getElementById('letterCount').style.color = '#dc2626';
  } else {
    document.getElementById('letterCount').style.color = '';
  }
});

function sendLetter() {
  const text = document.getElementById('letterText').value.trim();
  if (!text) return;
  const words = text.split(/\s+/).filter(Boolean).length;
  if (words > 250) { alert('Please keep your letter under 250 words.'); return; }
  document.getElementById('letterForm').style.display = 'none';
  document.getElementById('letterSent').style.display = 'block';
  const letters = JSON.parse(localStorage.getItem('ph_letters') || '[]');
  letters.push({ to: STATE.letterRecipient, text, date: new Date().toISOString(), words });
  localStorage.setItem('ph_letters', JSON.stringify(letters));
}

function closeLetter() {
  document.getElementById('letterModal').classList.remove('open');
  setTimeout(() => {
    document.getElementById('letterForm').style.display = '';
    document.getElementById('letterSent').style.display = 'none';
    document.getElementById('letterText').value = '';
    document.getElementById('letterCount').textContent = '0 / 250 words';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.nav-btn').classList.add('active');
  }, 500);
}

/* ── Constellation ── */
function showConstellationStars() {
  const modal = document.getElementById('constellationModal');
  const mem = STATE.memories[Math.floor(Math.random() * STATE.memories.length)];
  document.getElementById('memDate').textContent = mem.date;
  document.getElementById('memTitle').textContent = mem.title;
  document.getElementById('memText').textContent = mem.text;
  modal.classList.add('open');
}

function closeConstellation() {
  document.getElementById('constellationModal').classList.remove('open');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.nav-btn').classList.add('active');
}

/* ── Story ── */
function showStoryPage() {
  const modal = document.getElementById('constellationModal');
  const now = new Date();
  const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  const dateStr = now.toLocaleDateString('en-IE', options);
  const hour = now.getHours();
  let timeWord = 'morning';
  if (hour >= 12 && hour < 17) timeWord = 'afternoon';
  else if (hour >= 17) timeWord = 'evening';
  document.getElementById('memDate').textContent = `Our Story · ${dateStr}`;
  document.getElementById('memTitle').textContent = `A ${timeWord} in two cities`;
  const stories = [
    `Dublin's ${timeWord} light filtered through the window while Bangalore hummed with its own rhythm. Between lectures and meetings, another day became part of a story that began in Coorg and stretches across continents.`,
    `The ${timeWord} was quiet in Dublin. In Bangalore, the evening traffic was just beginning. Somewhere between those two worlds, a love story continued — not loud, not dramatic, just steady and true.`,
    `Another ${timeWord}, another day of choosing each other. Rashmi closed her laptop after hours of studying AI. Sharath finished his last commit. Both tired. Both grateful. Both home — even when home is 5,000 miles apart.`,
    `The rain came to Dublin this ${timeWord}. In Bangalore, the sun was setting. Different skies. Same moon. Same love. Another page written in the story of us.`,
    `Between a ${timeWord} lecture on neural networks and a late-night sprint at work, two people remembered why they chose each other. Not because it was easy. Because it was right.`
  ];
  document.getElementById('memText').textContent = stories[Math.floor(Math.random() * stories.length)];
  modal.classList.add('open');
}

/* ── Thinking of You ── */
function thinkOfYou() {
  const btn = document.getElementById('thinkBtn');
  btn.classList.add('pulse');
  setTimeout(() => btn.classList.remove('pulse'), 1000);
  const notifications = JSON.parse(localStorage.getItem('ph_think') || '[]');
  notifications.push({ from: 'Rashmi', time: new Date().toISOString() });
  localStorage.setItem('ph_think', JSON.stringify(notifications));
}

/* ── Close modals on outside click ── */
document.getElementById('letterModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeLetter(); });
document.getElementById('constellationModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeConstellation(); });

/* ── Resize ── */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { initStars(); initFireflies(); }, 200);
});

/* ── Init ── */
initStars();
initFireflies();
requestAnimationFrame(animate);
runEntrance();
updateClock();
setInterval(updateClock, 10000);
</script>
</body>
</html>
