<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Hearts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;cursor:none}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#cursor{position:fixed;width:12px;height:12px;border-radius:50%;border:1px solid rgba(200,168,85,0.4);pointer-events:none;z-index:100;transform:translate(-50%,-50%);transition:width 0.3s,height 0.3s,border-color 0.3s}
#cursor.look{width:40px;height:40px;border-color:rgba(200,168,85,0.8)}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.7) 100%)}
#load{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 2s ease}
#load.done{opacity:0;pointer-events:none}
#load .bar{width:120px;height:1px;background:rgba(200,168,85,0.15);margin-top:24px;position:relative;overflow:hidden}
#load .bar-fill{height:100%;background:rgba(200,168,85,0.6);width:0;transition:width 0.3s}
#load .pct{font-size:11px;color:rgba(200,168,85,0.4);margin-top:8px;letter-spacing:0.15em;font-weight:300}
#intro{position:fixed;inset:0;z-index:150;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.5s}
#intro.show{opacity:1;pointer-events:auto}
#intro.hide{opacity:0;pointer-events:none}
.line{font-size:clamp(28px,5vw,56px);font-weight:200;color:rgba(240,230,210,0.9);letter-spacing:0.04em;opacity:0;transform:translateY(12px);transition:opacity 1.5s ease,transform 1.5s ease;text-align:center;line-height:1.3}
.line.on{opacity:1;transform:translateY(0)}
.line small{font-size:0.35em;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,168,85,0.5);display:block;margin-top:8px;font-weight:300}
#enterPrompt{position:fixed;bottom:10vh;left:50%;transform:translateX(-50%);z-index:151;opacity:0;transition:opacity 2s;cursor:pointer}
#enterPrompt.show{opacity:1}
#enterPrompt span{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(200,168,85,0.4);animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:0.3}50%{opacity:0.7}}
#label{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:10;opacity:0;transition:opacity 1s;pointer-events:none;text-align:center}
#label.show{opacity:1}
#label .name{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,168,85,0.35);font-weight:300}
#label .hint{font-size:10px;color:rgba(240,230,210,0.15);margin-top:6px;letter-spacing:0.15em;font-weight:300}
#prompt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;opacity:0;transition:opacity 1.5s;pointer-events:none;text-align:center}
#prompt.show{opacity:1}
#prompt p{font-size:clamp(14px,2vw,18px);font-weight:200;color:rgba(240,230,210,0.5);line-height:1.8;letter-spacing:0.02em;max-width:400px}
#prompt .attr{font-size:11px;color:rgba(200,168,85,0.3);margin-top:12px;letter-spacing:0.15em;font-weight:300}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border-radius:50%;background:rgba(200,168,85,0.25);z-index:10;pointer-events:none;opacity:0;transition:opacity 1s}
#crosshair.show{opacity:1}
#interactHint{position:fixed;bottom:25%;left:50%;transform:translateX(-50%);z-index:10;opacity:0;transition:opacity 0.8s;pointer-events:none}
#interactHint.show{opacity:1}
#interactHint span{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,168,85,0.4)}
</style>
</head>
<body>
<div id="load"><div class="bar"><div class="bar-fill" id="loadBar"></div></div><div class="pct" id="loadPct">0</div></div>
<div id="intro">
  <div class="line" id="l1">Rashmi<small>&</small></div>
  <div class="line" id="l2">Sharath</div>
  <div class="line" id="l3" style="font-size:clamp(14px,2vw,20px);margin-top:32px;font-style:italic;color:rgba(200,168,85,0.5)">&ldquo;God put us in each each other&rsquo;s hands.&rdquo;</div>
</div>
<div id="enterPrompt"><span>click to enter</span></div>
<div id="cursor"></div>
<div id="vignette"></div>
<div id="label"><div class="name">The Glasshouse</div><div class="hint">WASD to move &middot; mouse to look</div></div>
<div id="prompt"><p id="promptText"></p><div class="attr" id="promptAttr"></div></div>
<div id="crosshair"></div>
<div id="interactHint"><span>look to discover</span></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {ShaderPass} from 'three/addons/postprocessing/ShaderPass.js';

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
const S = {
  loaded: false, introDone: false, started: false, locked: false,
  move: {f:false,b:false,l:false,r:false},
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  mouseX: 0, mouseY: 0,
  playerHeight: 1.7,
  playerPos: new THREE.Vector3(0, 1.7, 8),
  ray: new THREE.Raycaster(),
  currentPrompt: null, promptTimer: 0,
  time: 0, delta: 0,
  fireflies: [], rain: [], leaves: [],
  discovered: new Set()
};

/* ═══════════════════════════════════════════════════════════════
   THREE.JS CORE
   ═══════════════════════════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.018);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.copy(S.playerPos);

/* ── Post-processing ── */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.85);
composer.addPass(bloom);
const vignetteShader = {
  uniforms:{tDiffuse:{value:null},darkness:{value:1.3},offset:{value:1.1}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float darkness;uniform float offset;varying vec2 vUv;void main(){vec4 t=texture2D(tDiffuse,vUv);vec2 u=(vUv-vec2(0.5))*vec2(offset);float v=1.0-dot(u,u);t.rgb*=smoothstep(0.0,1.0,v/darkness);gl_FragColor=t;}`
};
composer.addPass(new ShaderPass(vignetteShader));

/* ═══════════════════════════════════════════════════════════════
   MATERIALS
   ═══════════════════════════════════════════════════════════════ */
const M = {
  concrete: new THREE.MeshStandardMaterial({color:0x3a3a3a, roughness:0.92, metalness:0.02}),
  concreteDark: new THREE.MeshStandardMaterial({color:0x2a2a2a, roughness:0.95, metalness:0.01}),
  glass: new THREE.MeshPhysicalMaterial({color:0xaaccdd, transmission:0.85, roughness:0.05, metalness:0.0, thickness:0.02, ior:1.5, envMapIntensity:0.3, transparent:true, opacity:0.35}),
  glassFrost: new THREE.MeshPhysicalMaterial({color:0xbbccdd, transmission:0.6, roughness:0.3, metalness:0.0, thickness:0.05, transparent:true, opacity:0.5}),
  wood: new THREE.MeshStandardMaterial({color:0x5a3a20, roughness:0.8, metalness:0.0}),
  woodLight: new THREE.MeshStandardMaterial({color:0x7a5a3a, roughness:0.75, metalness:0.0}),
  metal: new THREE.MeshStandardMaterial({color:0x222222, roughness:0.3, metalness:0.85}),
  metalWarm: new THREE.MeshStandardMaterial({color:0x8a7050, roughness:0.4, metalness:0.6}),
  leaf: new THREE.MeshStandardMaterial({color:0x3a6030, roughness:0.7, metalness:0.0, side:THREE.DoubleSide}),
  leafBright: new THREE.MeshStandardMaterial({color:0x5a8a40, roughness:0.65, metalness:0.0, side:THREE.DoubleSide}),
  bark: new THREE.MeshStandardMaterial({color:0x2d1b0f, roughness:0.95, metalness:0.0}),
  water: new THREE.MeshPhysicalMaterial({color:0x1a2a3a, roughness:0.05, metalness:0.1, transmission:0.7, transparent:true, opacity:0.6}),
  paper: new THREE.MeshStandardMaterial({color:0xf0e6d0, roughness:0.9, metalness:0.0}),
  fabric: new THREE.MeshStandardMaterial({color:0x3a3028, roughness:0.95, metalness:0.0}),
  glow: new THREE.MeshStandardMaterial({color:0xffcc66, emissive:0xffcc66, emissiveIntensity:2.0}),
  glowSoft: new THREE.MeshStandardMaterial({color:0xffddaa, emissive:0xffddaa, emissiveIntensity:0.8}),
  bookA: new THREE.MeshStandardMaterial({color:0x8b2500, roughness:0.8}),
  bookB: new THREE.MeshStandardMaterial({color:0x1a3a5a, roughness:0.8}),
  bookC: new THREE.MeshStandardMaterial({color:0x2a4a2a, roughness:0.8}),
  bookD: new THREE.MeshStandardMaterial({color:0x5a3a1a, roughness:0.8}),
};

/* ═══════════════════════════════════════════════════════════════
   LIGHTING
   ═══════════════════════════════════════════════════════════════ */
const ambLight = new THREE.AmbientLight(0x0a0a1a, 0.15);
scene.add(ambLight);

const moonLight = new THREE.DirectionalLight(0x8899cc, 0.4);
moonLight.position.set(-15, 20, -10);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048, 2048);
moonLight.shadow.camera.near = 0.5;
moonLight.shadow.camera.far = 60;
moonLight.shadow.camera.left = -20;
moonLight.shadow.camera.right = 20;
moonLight.shadow.camera.top = 20;
moonLight.shadow.camera.bottom = -20;
moonLight.shadow.bias = -0.0005;
scene.add(moonLight);

const lantern = new THREE.PointLight(0xffaa44, 1.8, 12, 1.5);
lantern.position.set(2.5, 2.8, 1);
lantern.castShadow = true;
lantern.shadow.mapSize.set(512, 512);
scene.add(lantern);

const lanternGlow = new THREE.PointLight(0xffcc66, 0.4, 8, 2);
lanternGlow.position.set(2.5, 3.2, 1);
scene.add(lanternGlow);

const treeLight = new THREE.PointLight(0x66aa55, 0.3, 10, 2);
treeLight.position.set(0, 4, 0);
scene.add(treeLight);

const warmFill = new THREE.PointLight(0xff9944, 0.15, 15, 2);
warmFill.position.set(-3, 1.5, 3);
scene.add(warmFill);

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function box(w,h,d,mat,pos,shadow=true){
  const g=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.Mesh(g,mat);
  if(pos)m.position.copy(pos);
  m.castShadow=shadow;m.receiveShadow=shadow;
  return m;
}
function cyl(rT,rB,h,mat,pos,seg=12){
  const g=new THREE.CylinderGeometry(rT,rB,h,seg);
  const m=new THREE.Mesh(g,mat);
  if(pos)m.position.copy(pos);
  m.castShadow=true;m.receiveShadow=true;
  return m;
}

/* ═══════════════════════════════════════════════════════════════
   THE GLASSHOUSE
   ═══════════════════════════════════════════════════════════════ */
const world = new THREE.Group();
scene.add(world);

/* ── Floor ── */
const floorGeo = new THREE.PlaneGeometry(16, 14, 32, 32);
const posAttr = floorGeo.attributes.position;
for(let i=0;i<posAttr.count;i++){
  const x=posAttr.getX(i), y=posAttr.getY(i);
  posAttr.setZ(i, (Math.sin(x*0.5)*Math.cos(y*0.3))*0.03);
}
floorGeo.computeVertexNormals();
const floor = new THREE.Mesh(floorGeo, M.concreteDark);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
world.add(floor);

/* ── Concrete base / raised platform ── */
const platform = box(16, 0.15, 14, M.concrete, new THREE.Vector3(0, -0.075, 0));
world.add(platform);

/* ── Walls (3 sides, front open) ── */
const wallH = 4.2;
const wallBack = box(16, wallH, 0.25, M.concrete, new THREE.Vector3(0, wallH/2, -7));
world.add(wallBack);
const wallLeft = box(0.25, wallH, 14, M.concrete, new THREE.Vector3(-8, wallH/2, 0));
world.add(wallLeft);
const wallRight = box(0.25, wallH, 14, M.concrete, new THREE.Vector3(8, wallH/2, 0));
world.add(wallRight);

/* ── Roof structure (concrete beams + glass) ── */
for(let i=-2;i<=2;i++){
  const beam = box(16, 0.15, 0.2, M.concrete, new THREE.Vector3(i*3.5, wallH+0.075, 0));
  world.add(beam);
}
/* Glass roof panels */
for(let i=-2;i<=1;i++){
  const panelGeo = new THREE.PlaneGeometry(3.3, 14);
  const panel = new THREE.Mesh(panelGeo, M.glass);
  panel.rotation.x = Math.PI/2;
  panel.position.set(i*3.5+1.75, wallH+0.16, 0);
  world.add(panel);
}

/* ── Vertical glass walls (between concrete) ── */
const glassWallL = new THREE.Mesh(new THREE.PlaneGeometry(14, wallH-0.5), M.glass);
glassWallL.rotation.y = Math.PI/2;
glassWallL.position.set(-7.87, wallH/2, 0);
world.add(glassWallL);
const glassWallR = new THREE.Mesh(new THREE.PlaneGeometry(14, wallH-0.5), M.glass);
glassWallR.rotation.y = -Math.PI/2;
glassWallR.position.set(7.87, wallH/2, 0);
world.add(glassWallR);

/* ── Back glass wall ── */
const glassBack = new THREE.Mesh(new THREE.PlaneGeometry(16, wallH-0.5), M.glassFrost);
glassBack.position.set(0, wallH/2, -6.87);
world.add(glassBack);

/* ═══════════════════════════════════════════════════════════════
   THE TREE — Our Marriage
   ═══════════════════════════════════════════════════════════════ */
function createTree(){
  const tree = new THREE.Group();
  /* Trunk */
  const trunkSegments = 8;
  for(let i=0;i<trunkSegments;i++){
    const t=i/trunkSegments;
    const h = 0.5 + t*0.2;
    const rBot = 0.22*(1-t*0.6);
    const rTop = 0.18*(1-t*0.6);
    const seg = cyl(rTop, rBot, h, M.bark, new THREE.Vector3(Math.sin(t*0.3)*0.1, 0.25+i*0.45, Math.cos(t*0.2)*0.05));
    tree.add(seg);
  }
  /* Branches */
  const branches = [
    {origin:[0.05,3.2,0], dir:[-1,0.3,-0.2], len:2.2, thick:0.06},
    {origin:[-0.05,3.0,0.05], dir:[1,0.4,-0.1], len:2.0, thick:0.055},
    {origin:[0.03,3.5,-0.05], dir:[-0.8,0.5,0.6], len:1.8, thick:0.045},
    {origin:[-0.02,3.4,0.03], dir:[0.6,0.6,-0.7], len:1.6, thick:0.04},
    {origin:[0,3.7,0], dir:[-0.3,0.8,0.4], len:1.4, thick:0.035},
    {origin:[0,3.6,0], dir:[0.4,0.7,-0.5], len:1.2, thick:0.03},
    {origin:[0,3.8,0], dir:[0,1,0], len:0.8, thick:0.025},
  ];
  branches.forEach(b=>{
    const dir = new THREE.Vector3(...b.dir).normalize();
    const origin = new THREE.Vector3(...b.origin);
    const segs = 4;
    for(let i=0;i<segs;i++){
      const t=i/segs;
      const r = b.thick*(1-t*0.5);
      const h = b.len/segs;
      const p = origin.clone().add(dir.clone().multiplyScalar(t*b.len));
      const branchSeg = cyl(r*0.8, r, h, M.bark, p);
      branchSeg.lookAt(p.clone().add(dir));
      branchSeg.rotateX(Math.PI/2);
      tree.add(branchSeg);
    }
    /* Leaf clusters at branch tips */
    const tipPos = origin.clone().add(dir.clone().multiplyScalar(b.len));
    for(let j=0;j<5;j++){
      const leafSize = 0.15+Math.random()*0.12;
      const leafGeo = new THREE.SphereGeometry(leafSize, 6, 4);
      leafGeo.scale(1, 0.4, 1);
      const mat = Math.random()>0.3 ? M.leaf.clone() : M.leafBright.clone();
      mat.color.offsetHSL(0, 0, (Math.random()-0.5)*0.15);
      const leaf = new THREE.Mesh(leafGeo, mat);
      leaf.position.copy(tipPos).add(new THREE.Vector3(
        (Math.random()-0.5)*0.5,
        (Math.random()-0.3)*0.4,
        (Math.random()-0.5)*0.5
      ));
      leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
      leaf.castShadow = true;
      leaf.userData.sway = {speed:0.3+Math.random()*0.4, offset:Math.random()*Math.PI*2, amount:0.02+Math.random()*0.02};
      tree.add(leaf);
    }
  });
  /* Canopy layer — more leaves for density */
  for(let i=0;i<40;i++){
    const angle = Math.random()*Math.PI*2;
    const radius = 0.5+Math.random()*1.8;
    const height = 3.2+Math.random()*1.5;
    const leafSize = 0.08+Math.random()*0.1;
    const leafGeo = new THREE.SphereGeometry(leafSize, 5, 3);
    leafGeo.scale(1, 0.35, 1);
    const mat = Math.random()>0.4 ? M.leaf.clone() : M.leafBright.clone();
    mat.color.offsetHSL(0, 0, (Math.random()-0.5)*0.2);
    const leaf = new THREE.Mesh(leafGeo, mat);
    leaf.position.set(Math.cos(angle)*radius, height, Math.sin(angle)*radius);
    leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
    leaf.castShadow = true;
    leaf.userData.sway = {speed:0.2+Math.random()*0.3, offset:Math.random()*Math.PI*2, amount:0.01+Math.random()*0.02};
    tree.add(leaf);
  }
  /* Roots */
  for(let i=0;i<5;i++){
    const angle = (i/5)*Math.PI*2 + Math.random()*0.3;
    const rootGeo = new THREE.CylinderGeometry(0.02, 0.04, 0.6+Math.random()*0.3, 5);
    const root = new THREE.Mesh(rootGeo, M.bark);
    root.position.set(Math.cos(angle)*0.25, 0.1, Math.sin(angle)*0.25);
    root.rotation.z = Math.cos(angle)*0.6;
    root.rotation.x = Math.sin(angle)*0.6;
    root.castShadow = true;
    tree.add(root);
  }
  tree.position.set(0, 0, 0);
  return tree;
}
const tree = createTree();
world.add(tree);

/* ═══════════════════════════════════════════════════════════════
   THE BENCH — Presence
   ═══════════════════════════════════════════════════════════════ */
function createBench(){
  const bench = new THREE.Group();
  /* Seat */
  bench.add(box(1.4, 0.06, 0.5, M.wood, new THREE.Vector3(0, 0.45, 0)));
  bench.add(box(1.3, 0.04, 0.45, M.woodLight, new THREE.Vector3(0, 0.48, 0)));
  /* Legs */
  bench.add(box(0.06, 0.45, 0.06, M.metal, new THREE.Vector3(-0.55, 0.225, 0.15)));
  bench.add(box(0.06, 0.45, 0.06, M.metal, new THREE.Vector3(0.55, 0.225, 0.15)));
  bench.add(box(0.06, 0.45, 0.06, M.metal, new THREE.Vector3(-0.55, 0.225, -0.15)));
  bench.add(box(0.06, 0.45, 0.06, M.metal, new THREE.Vector3(0.55, 0.225, -0.15)));
  /* Backrest */
  bench.add(box(1.4, 0.5, 0.04, M.wood, new THREE.Vector3(0, 0.75, -0.22)));
  bench.add(box(1.3, 0.04, 0.03, M.woodLight, new THREE.Vector3(0, 0.6, -0.22)));
  bench.add(box(1.3, 0.04, 0.03, M.woodLight, new THREE.Vector3(0, 0.85, -0.22)));
  /* Coffee mug (Sharath) */
  const mugGroup = new THREE.Group();
  mugGroup.add(cyl(0.04, 0.035, 0.08, M.paper, new THREE.Vector3(0,0.04,0)));
  const mugHandle = new THREE.Mesh(new THREE.TorusGeometry(0.025, 0.006, 6, 12, Math.PI), M.paper);
  mugHandle.position.set(0.04, 0.04, 0);
  mugHandle.rotation.y = Math.PI/2;
  mugGroup.add(mugHandle);
  /* Steam */
  for(let i=0;i<3;i++){
    const steamGeo = new THREE.SphereGeometry(0.008, 4, 4);
    const steamMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.08});
    const steam = new THREE.Mesh(steamGeo, steamMat);
    steam.position.set((Math.random()-0.5)*0.02, 0.09+i*0.025, (Math.random()-0.5)*0.02);
    steam.userData.steam = {speed:0.5+Math.random()*0.3, offset:i*0.5};
    mugGroup.add(steam);
  }
  mugGroup.position.set(-0.4, 0.51, 0);
  bench.add(mugGroup);
  /* Book (Rashmi) */
  const bookGroup = new THREE.Group();
  bookGroup.add(box(0.12, 0.015, 0.17, M.bookA, new THREE.Vector3(0, 0.0075, 0)));
  bookGroup.add(box(0.11, 0.012, 0.16, M.bookB, new THREE.Vector3(0.005, 0.02, 0.005)));
  bookGroup.position.set(0.35, 0.51, 0.02);
  bench.add(bookGroup);

function createPlant(pos, size=1){
  const p = new THREE.Group();

    const leafGeo = new THREE.SphereGeometry(0.04*size, 5, 3);
    leafGeo.scale(1, 0.3, 0.6);
    const leafMesh = new THREE.Mesh(leafGeo, M.leafBright.clone());

    leafMesh.position.set(Math.cos(angle)*0.06*size, 0.15*size+stemH, Math.sin(angle)*0.06*size);

    leafMesh.userData.sway = {speed:0.3+Math.random()*0.3, offset:Math.random()*6, amount:0.015};

  }
  p.position.copy(pos);

}

const keys = {};
document.addEventListener('keydown', e=>{
  keys[e.code]=true;

});

const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e=>{
  S.mouseX = (e.clientX/window.innerWidth)*2-1;
  S.mouseY = (e.clientY/window.innerHeight)*2-1;
  cursor.style.left = e.clientX+'px';
  cursor.style.top = e.clientY+'px';
  if(S.locked){
    S.yaw -= e.movementX*0.002;
    S.pitch -= e.movementY*0.002;
    S.pitch = Math.max(-1.2, Math.min(1.2, S.pitch));
  }
});

document.addEventListener('pointerlockchange', ()=>{
  S.locked = document.pointerLockElement === renderer.domElement;
  cursor.style.display = S.locked ? 'none' : 'block';
  document.getElementById('crosshair').classList.toggle('show', S.locked);
});

const promptEl = document.getElementById('prompt');

/* ═══════════════════════════════════════════════════════════════
   UPDATE LOOP
   ═══════════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();
const moveDir = new THREE.Vector3();
const moveSpeed = 4.0;
const friction = 8.0;
const headBob = {phase:0, amount:0};

function update(){
  S.delta = Math.min(clock.getDelta(), 0.05);
  S.time += S.delta;
  if(!S.started) return;

  /* ── Movement ── */
  moveDir.set(0,0,0);
  if(keys.KeyW||keys.ArrowUp) moveDir.z -= 1;
  if(keys.KeyS||keys.ArrowDown) moveDir.z += 1;
  if(keys.KeyA||keys.ArrowLeft) moveDir.x -= 1;
  if(keys.KeyD||keys.ArrowRight) moveDir.x += 1;
  moveDir.normalize();
  /* Rotate direction by yaw */
  const sinY = Math.sin(S.yaw), cosY = Math.cos(S.yaw);
  const worldDir = new THREE.Vector3(
    moveDir.x*cosY - moveDir.z*sinY,
    0,
    moveDir.x*sinY + moveDir.z*cosY
  );
  S.vel.lerp(worldDir.multiplyScalar(moveSpeed), S.delta*friction);
  S.playerPos.add(S.vel.clone().multiplyScalar(S.delta));
  clampPlayer();

  /* ── Head bob ── */
  const isMoving = moveDir.length() > 0.01;
  if(isMoving){
    headBob.phase += S.delta * 8;
    headBob.amount = THREE.MathUtils.lerp(headBob.amount, 0.04, S.delta*5);
  } else {
    headBob.amount = THREE.MathUtils.lerp(headBob.amount, 0, S.delta*3);
  }

  /* ── Camera ── */
  const camTarget = new THREE.Vector3(
    S.playerPos.x,
    S.playerPos.y + Math.sin(headBob.phase)*headBob.amount,
    S.playerPos.z
  );
  camera.position.lerp(camTarget, S.delta*12);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = S.yaw;
  camera.rotation.x = S.pitch;
  /* Subtle breathing */
  camera.rotation.z = Math.sin(S.time*0.3)*0.003;

  /* ── Fireflies ── */
  const ffPos = fireflies.geometry.attributes.position;
  for(let i=0;i<ffCount;i++){
    const f = S.fireflies[i];
    f.wanderAngle += (Math.random()-0.5)*0.1;
    f.vel.x += Math.cos(f.wanderAngle)*0.02;
    f.vel.z += Math.sin(f.wanderAngle)*0.02;
    f.vel.y += Math.sin(S.time*f.speed+f.phase)*0.01;
    f.vel.multiplyScalar(0.98);
    const nx = ffPos.getX(i)+f.vel.x*S.delta;
    const ny = ffPos.getY(i)+f.vel.y*S.delta;
    const nz = ffPos.getZ(i)+f.vel.z*S.delta;
    if(Math.abs(nx)>6) f.vel.x*=-1;
    if(ny<0.3||ny>3.5) f.vel.y*=-1;
    if(Math.abs(nz)>5) f.vel.z*=-1;
    ffPos.setXYZ(i, nx, ny, nz);
  }
  ffPos.needsUpdate = true;
  ffMat.uniforms.time.value = S.time;

  /* ── Rain ── */
  const rPos = rain.geometry.attributes.position;
  for(let i=0;i<rainCount;i++){
    let y = rPos.getY(i) - rainVelocities[i]*S.delta;
    let x = rPos.getX(i) + Math.sin(S.time+i)*0.02;
    if(y < 0){
      y = 8+Math.random()*4;
      x = S.playerPos.x + (Math.random()-0.5)*20;
      rPos.setZ(i, S.playerPos.z + (Math.random()-0.5)*20);
    }
    rPos.setXY(i, x, y);
  }
  rPos.needsUpdate = true;

  /* ── Leaves ── */
  leaves.forEach(l=>{
    const f = l.userData.falling;
    f.vel.x += Math.sin(S.time*0.5+f.windPhase)*0.005;
    l.position.add(f.vel.clone().multiplyScalar(S.delta));
    l.rotation.x += f.rotSpeed.x*S.delta;
    l.rotation.y += f.rotSpeed.y*S.delta;
    l.rotation.z += f.rotSpeed.z*S.delta;
    if(l.position.y < 0.1){
      l.position.set((Math.random()-0.5)*6, f.resetY, (Math.random()-0.5)*4);
    }
  });

  /* ── Tree leaves sway ── */
  tree.children.forEach(child=>{
    if(child.userData.sway){
      const s = child.userData.sway;
      child.rotation.z = Math.sin(S.time*s.speed+s.offset)*s.amount;
      child.rotation.x += Math.sin(S.time*s.speed*0.7+s.offset)*s.amount*0.5;
    }
  });

  /* ── Water ripple ── */
  waterFeature.children[1].material.roughness = 0.05+Math.sin(S.time*0.8)*0.02;

  /* ── Lantern flicker ── */
  lantern.intensity = 1.8+Math.sin(S.time*3)*0.15+Math.sin(S.time*7)*0.05;
  lanternGlow.intensity = 0.4+Math.sin(S.time*2)*0.05;

  /* ── Steam from mug ── */
  bench.children.forEach(child=>{
    if(child.isGroup) child.children.forEach(c=>{
      if(c.userData.steam){
        const s = c.userData.steam;
        c.position.y = 0.09+Math.sin(S.time*s.speed+s.offset)*0.015+0.025;
        c.material.opacity = 0.04+Math.sin(S.time*s.speed+s.offset)*0.03;
      }
    });
  });

  /* ── Look-at interaction ── */
  S.ray.setFromCamera(new THREE.Vector2(0,0), camera);
  let hitObject = null;
  let minDist = Infinity;
  interactives.forEach(obj=>{
    const hits = S.ray.intersectObject(obj, true);
    if(hits.length > 0 && hits[0].distance < minDist && hits[0].distance < 6){
      minDist = hits[0].distance;
      hitObject = obj;
    }
  });
  cursor.classList.toggle('look', !!hitObject);
  if(hitObject && hitObject.userData.prompt){
    showPrompt(hitObject.userData.prompt);
  } else {
    hidePrompt();
  }
}

/* ═══════════════════════════════════════════════════════════════
   RENDER LOOP
   ═══════════════════════════════════════════════════════════════ */
function animate(){
  requestAnimationFrame(animate);
  update();
  composer.render();
}
animate();

/* ═══════════════════════════════════════════════════════════════
   LOADING
   ═══════════════════════════════════════════════════════════════ */
let loadProgress = 0;
const loadBar = document.getElementById('loadBar');
const loadPct = document.getElementById('loadPct');
function updateLoad(p){
  loadProgress = p;
  loadBar.style.width = p+'%';
  loadPct.textContent = Math.round(p);
}
function finishLoad(){
  updateLoad(100);
  setTimeout(()=>{
    document.getElementById('load').classList.add('done');
    setTimeout(showIntro, 1500);
  }, 800);
}

/* ── Simulate load ── */
let loadTick = 0;
const loadInterval = setInterval(()=>{
  loadTick += 3+Math.random()*8;
  if(loadTick >= 100){
    loadTick = 100;
    clearInterval(loadInterval);
    finishLoad();
  }
  updateLoad(loadTick);
}, 200);

/* ═══════════════════════════════════════════════════════════════
   INTRO SEQUENCE
   ═══════════════════════════════════════════════════════════════ */
function showIntro(){
  const intro = document.getElementById('intro');
  intro.classList.add('show');
  setTimeout(()=>document.getElementById('l1').classList.add('on'), 800);
  setTimeout(()=>document.getElementById('l2').classList.add('on'), 2200);
  setTimeout(()=>document.getElementById('l3').classList.add('on'), 3800);
  setTimeout(()=>{
    document.getElementById('enterPrompt').classList.add('show');
  }, 5200);
}

/* ── Enter world ── */
function enterWorld(){
  if(S.started) return;
  renderer.domElement.requestPointerLock();
  S.started = true;
  document.getElementById('intro').classList.add('hide');
  document.getElementById('enterPrompt').classList.remove('show');
  setTimeout(()=>{
    document.getElementById('label').classList.add('show');
    setTimeout(()=>document.getElementById('label').classList.remove('show'), 5000);
    /* First prompt */
    setTimeout(()=>showPrompt({text:'Welcome home.', attr:''}), 3000);
  }, 1500);
}

renderer.domElement.addEventListener('click', ()=>{
  if(!S.started){
    enterWorld();
  } else if(!S.locked){
    renderer.domElement.requestPointerLock();
  }
});
document.getElementById('enterPrompt').addEventListener('click', enterWorld);

/* ═══════════════════════════════════════════════════════════════
   RESIZE
   ═══════════════════════════════════════════════════════════════ */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

/* ── Set initial camera look ── */
S.yaw = Math.PI;
S.playerPos.set(0, 1.7, 6);
</script>
