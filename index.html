<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parallel Hearts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c8a855;--gold-dim:rgba(200,168,85,0.3);--warm:#f0e6d2;--ivory:rgba(240,230,210,0.45);
  --midnight:#050816;--midnight-deep:#020510;
  --aurora:#4a9eff;--aurora-dim:rgba(74,158,255,0.15);
  --silver:#b8c5d6;--silver-dim:rgba(184,197,214,0.2);
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',-apple-system,sans-serif
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--warm);font-family:var(--sans);-webkit-font-smoothing:antialiased;cursor:none}
::selection{background:var(--gold);color:var(--midnight)}

/* ── Custom Cursor ── */
#cursor{position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:screen}
.cursor-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;position:absolute;top:-3px;left:-3px;transition:transform .2s,background .3s}
.cursor-ring{width:36px;height:36px;border:1px solid rgba(200,168,85,0.3);border-radius:50%;position:absolute;top:-18px;left:-18px;transition:transform .4s cubic-bezier(.16,1,.3,1),width .3s,height .3s,top .3s,left .3s,border-color .3s,background .3s}
#cursor.hover .cursor-dot{transform:scale(0);background:var(--aurora)}
#cursor.hover .cursor-ring{width:56px;height:56px;top:-28px;left:-28px;border-color:rgba(74,158,255,0.4);background:rgba(74,158,255,0.03)}
#cursor.click .cursor-ring{transform:scale(.85)}

/* ── Cursor Trail ── */
.ct{position:fixed;pointer-events:none;z-index:9998;border-radius:50%;background:var(--gold);mix-blend-mode:screen}

/* ── Cursor Glow ── */
#cursorGlow{position:fixed;pointer-events:none;z-index:4;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,85,0.03) 0%,transparent 70%);transform:translate(-50%,-50%)}

/* ═══════════════════════════════════════════
   ACT 1: CINEMATIC LANDING
   ═══════════════════════════════════════════ */
#landing{position:fixed;inset:0;z-index:50;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 2s cubic-bezier(.16,1,.3,1)}
#landing.fade{opacity:0;pointer-events:none}

/* Distance counter */
#distText{font-family:var(--serif);font-size:clamp(28px,5vw,56px);font-weight:300;color:var(--warm);letter-spacing:.04em;opacity:0;transition:opacity 1.5s}
#distText .km{font-size:.5em;color:var(--ivory);font-weight:200;letter-spacing:.08em}

/* City dots */
#cityDots{position:relative;width:min(500px,80vw);height:120px;margin-top:40px;opacity:0;transition:opacity 1.5s}
.city-dot{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px}
.city-dot .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 20px rgba(200,168,85,0.4);animation:dotPulse 2s ease-in-out infinite}
.city-dot .label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);font-weight:300}
.city-dot.dublin{left:10%;top:20%}
.city-dot.bangalore{right:10%;top:50%}
@keyframes dotPulse{0%,100%{box-shadow:0 0 20px rgba(200,168,85,0.3)}50%{box-shadow:0 0 35px rgba(200,168,85,0.6)}}

/* Heartbeat line */
#heartbeatLine{position:absolute;top:50%;left:10%;right:10%;height:1px;opacity:0;transition:opacity 1.5s}
#heartbeatLine svg{width:100%;height:40px;overflow:visible}
#heartbeatLine path{fill:none;stroke:var(--gold);stroke-width:1.5;stroke-dasharray:600;stroke-dashoffset:600;filter:drop-shadow(0 0 6px rgba(200,168,85,0.3))}
#heartbeatLine.animate path{animation:drawLine 3s cubic-bezier(.16,1,.3,1) forwards,pulseLine 2s ease-in-out 3s infinite}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes pulseLine{0%,100%{stroke-opacity:.4;stroke-width:1.5}50%{stroke-opacity:1;stroke-width:2}}

/* Title */
#titleBlock{text-align:center;margin-top:48px;opacity:0;transition:opacity 2s}
#titleBlock h1{font-family:var(--serif);font-size:clamp(36px,7vw,80px);font-weight:300;letter-spacing:.03em;line-height:1.1;color:var(--warm)}
#titleBlock h1 em{font-style:italic;color:var(--gold);font-weight:300}
#titleBlock .tagline{font-family:var(--sans);font-size:clamp(11px,1.5vw,15px);font-weight:200;color:var(--ivory);letter-spacing:.12em;margin-top:16px}

/* Enter button */
#enterBtn{margin-top:48px;padding:12px 32px;border:1px solid rgba(200,168,85,0.2);border-radius:32px;background:transparent;color:var(--gold);font-family:var(--sans);font-size:11px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;opacity:0;transition:all .5s cubic-bezier(.16,1,.3,1)}
#enterBtn:hover{background:rgba(200,168,85,0.06);border-color:rgba(200,168,85,0.4);transform:scale(1.04)}
#enterBtn.show{animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}

/* ═══════════════════════════════════════════
   ACT 2: FLOATING UNIVERSE
   ═══════════════════════════════════════════ */
#universeCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity 3s}
#universeCanvas.show{opacity:1;pointer-events:auto}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:15;display:flex;justify-content:space-between;align-items:flex-start;padding:24px 32px;opacity:0;transition:opacity 1.5s;pointer-events:none}
#hud.show{opacity:1;pointer-events:auto}
.hud-city{text-align:right}
.hud-city:first-child{text-align:left}
.hud-city .city-name{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,168,85,0.3);font-weight:300}
.hud-city .city-time{font-family:var(--serif);font-size:clamp(16px,2vw,24px);font-weight:300;color:var(--warm);letter-spacing:.02em}
.hud-city .city-time-period{font-size:9px;color:var(--ivory);margin-top:2px;letter-spacing:.08em}
.hud-center{text-align:center}
.hud-center .countdown-label{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,168,85,0.25);font-weight:300}
.hud-center .countdown-val{font-family:var(--serif);font-size:13px;color:rgba(240,230,210,0.35);margin-top:2px}

/* ── Scene Label ── */
#sceneLabel{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:15;opacity:0;transition:opacity 1.5s;pointer-events:none;text-align:center}
#sceneLabel.show{opacity:1}
.sl-name{font-family:var(--serif);font-size:clamp(14px,2vw,18px);font-weight:300;color:var(--gold);letter-spacing:.06em}
.sl-hint{font-size:9px;color:rgba(240,230,210,0.2);margin-top:4px;letter-spacing:.15em;font-weight:300}

/* ── Constellation Nav ── */
#constNav{position:fixed;right:28px;top:50%;transform:translateY(-50%);z-index:15;display:flex;flex-direction:column;gap:0;opacity:0;transition:opacity 1.5s;pointer-events:none}
#constNav.show{opacity:1;pointer-events:auto}
.const-star{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;transition:all .4s}
.const-star .star-dot{width:6px;height:6px;border-radius:50%;border:1px solid rgba(200,168,85,0.25);background:transparent;transition:all .4s;flex-shrink:0}
.const-star .star-label{font-size:9px;letter-spacing:.12em;color:rgba(200,168,85,0.2);font-weight:300;transition:color .4s;text-transform:uppercase;white-space:nowrap}
.const-star:hover .star-dot{border-color:var(--gold);background:rgba(200,168,85,0.15);transform:scale(1.4)}
.const-star:hover .star-label{color:rgba(200,168,85,0.6)}
.const-star.active .star-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(200,168,85,0.4)}
.const-star.active .star-label{color:var(--gold)}

/* ── I Miss You Button ── */
#missBtn{position:fixed;bottom:40px;right:32px;z-index:15;width:48px;height:48px;border-radius:50%;border:1px solid rgba(200,168,85,0.12);background:rgba(255,255,255,0.01);backdrop-filter:blur(20px);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .5s cubic-bezier(.16,1,.3,1);pointer-events:none}
#missBtn.show{opacity:.5;pointer-events:auto}
#missBtn:hover{opacity:1;border-color:rgba(200,168,85,0.3);transform:scale(1.08)}
#missBtn .heart{width:16px;height:16px;position:relative}
#missBtn .heart::before,#missBtn .heart::after{content:'';position:absolute;top:0;width:10px;height:16px;border-radius:10px 10px 0 0;background:var(--gold);transform-origin:bottom center}
#missBtn .heart::before{left:0;transform:rotate(-45deg);transform-origin:bottom right}
#missBtn .heart::after{left:6px;transform:rotate(45deg);transform-origin:bottom left}
#missBtn.pulsing{animation:heartPulse 1.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes heartPulse{0%{transform:scale(1)}20%{transform:scale(1.25);box-shadow:0 0 40px rgba(200,168,85,0.3)}100%{transform:scale(1)}}

/* ── I Miss You Received Pulse ── */
#missPulse{position:fixed;inset:0;z-index:12;background:radial-gradient(ellipse at center,rgba(200,168,85,0.08) 0%,transparent 70%);opacity:0;pointer-events:none;transition:opacity 0.6s}
#missPulse.show{opacity:1}
#missToast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center;opacity:0;pointer-events:none;transition:opacity 0.8s}
#missToast.show{opacity:1}
#missToast .miss-name{font-family:var(--serif);font-size:18px;color:var(--gold);font-weight:300;letter-spacing:.04em}
#missToast .miss-sub{font-size:10px;color:var(--ivory);letter-spacing:.15em;margin-top:4px}

/* ── Moon ── */
#moonBtn{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:15;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#eee 0%,#ccc 50%,#999 100%);box-shadow:0 0 20px rgba(200,200,180,0.15);cursor:pointer;opacity:0;transition:all .5s;pointer-events:none;border:none}
#moonBtn.show{opacity:.6;pointer-events:auto}
#moonBtn:hover{opacity:1;box-shadow:0 0 30px rgba(200,200,180,0.25);transform:translateX(-50%) scale(1.1)}

/* ── Moon Message Overlay ── */
#moonOverlay{position:fixed;inset:0;z-index:25;background:rgba(2,2,8,0.92);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;visibility:hidden;transition:all .8s cubic-bezier(.16,1,.3,1)}
#moonOverlay.open{opacity:1;visibility:visible}
#moonOverlay .moon-big{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0%,#eee 30%,#ccc 60%,#999 100%);box-shadow:0 0 60px rgba(200,200,180,0.15),0 0 120px rgba(200,200,180,0.05);margin-bottom:32px}
#moonOverlay .moon-date{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
#moonOverlay .moon-msg{font-family:var(--serif);font-size:clamp(18px,3vw,28px);font-weight:300;color:var(--warm);text-align:center;max-width:500px;line-height:1.6;font-style:italic}
#moonOverlay .moon-close{margin-top:40px;padding:8px 24px;border:1px solid rgba(200,168,85,0.15);border-radius:20px;background:transparent;color:var(--gold);font-size:10px;letter-spacing:.15em;cursor:pointer;transition:all .3s}
#moonOverlay .moon-close:hover{border-color:rgba(200,168,85,0.4);background:rgba(200,168,85,0.05)}

/* ── Letter Writing Overlay ── */
#letterOverlay{position:fixed;inset:0;z-index:25;background:rgba(2,2,8,0.92);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .8s cubic-bezier(.16,1,.3,1)}
#letterOverlay.open{opacity:1;visibility:visible}
.letter-envelope{width:min(440px,90vw);background:linear-gradient(145deg,rgba(15,18,30,0.95),rgba(10,12,25,0.98));border:1px solid rgba(200,168,85,0.1);border-radius:20px;padding:36px;transform:translateY(30px) scale(.95);transition:transform .8s cubic-bezier(.16,1,.3,1);position:relative}
#letterOverlay.open .letter-envelope{transform:translateY(0) scale(1)}
.letter-envelope h3{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--gold);margin-bottom:16px}
.letter-envelope textarea{width:100%;min-height:140px;border:none;background:transparent;color:var(--warm);font-family:var(--serif);font-size:17px;line-height:1.8;resize:none;outline:none}
.letter-envelope textarea::placeholder{color:rgba(240,230,210,0.12);font-style:italic}
.letter-actions{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.03)}
.letter-count{font-size:9px;color:rgba(240,230,210,0.25);letter-spacing:.08em}
.letter-send{padding:8px 20px;border:1px solid rgba(200,168,85,0.2);border-radius:24px;background:rgba(200,168,85,0.04);color:var(--gold);font-family:var(--sans);font-size:10px;font-weight:400;cursor:pointer;transition:all .4s;letter-spacing:.06em}
.letter-send:hover{background:rgba(200,168,85,0.1);border-color:rgba(200,168,85,0.4)}
.letter-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);color:rgba(240,230,210,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}

/* ── Paper Airplane Animation ── */
.paper-plane{position:fixed;z-index:30;pointer-events:none;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid var(--warm);filter:drop-shadow(0 0 6px rgba(200,168,85,0.3))}

/* ── Firefly Notification ── */
.firefly{position:fixed;z-index:30;width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px rgba(200,168,85,0.5);pointer-events:auto;cursor:pointer;transition:box-shadow .3s}
.firefly:hover{box-shadow:0 0 24px rgba(200,168,85,0.8)}
.firefly.opening{animation:fireflyLand .8s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fireflyLand{0%{transform:scale(1)}50%{transform:scale(1.5);box-shadow:0 0 40px rgba(200,168,85,0.6)}100%{transform:scale(0);opacity:0}}

/* ── Toast ── */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);z-index:30;background:rgba(5,8,22,0.92);backdrop-filter:blur(24px);border:1px solid rgba(200,168,85,0.12);border-radius:16px;padding:20px 32px;text-align:center;opacity:0;pointer-events:none;transition:all .6s cubic-bezier(.16,1,.3,1)}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast-text{font-family:var(--serif);font-size:15px;color:var(--warm);font-weight:300}

/* ── Audio Controls ── */
#audioControls{position:fixed;bottom:40px;left:32px;z-index:15;display:flex;gap:8px;opacity:0;transition:opacity 1.5s;pointer-events:none}
#audioControls.show{opacity:1;pointer-events:auto}
.audio-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(200,168,85,0.1);background:rgba(255,255,255,0.01);color:var(--silver);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.audio-btn:hover{border-color:rgba(200,168,85,0.3);color:var(--gold)}
.audio-btn.active{background:rgba(200,168,85,0.06);border-color:rgba(200,168,85,0.2);color:var(--gold)}

/* ── Scroll Indicator ── */
#scrollIndicator{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:15;text-align:center;opacity:0;transition:opacity 1s;pointer-events:none}
#scrollIndicator.show{opacity:1}
#scrollIndicator .scroll-text{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,168,85,0.2);margin-bottom:8px}
#scrollIndicator .scroll-line{width:1px;height:24px;background:linear-gradient(to bottom,rgba(200,168,85,0.3),transparent);margin:0 auto;animation:scrollPulse 2s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:.8;transform:scaleY(1.3)}}

/* ── Time of Day Overlay ── */
#timeOverlay{position:fixed;inset:0;z-index:2;pointer-events:none;transition:background 2s}

@media(max-width:768px){
  #hud{padding:16px 20px}
  .hud-center{display:none}
  #constNav{right:12px}
  .const-star .star-label{display:none}
  #missBtn{bottom:24px;right:20px;width:40px;height:40px}
  #audioControls{bottom:24px;left:20px}
  #moonBtn{top:48px;width:28px;height:28px}
}
</style>
</head>
<body>

<!-- ═══ ACT 1: CINEMATIC LANDING ═══ -->
<div id="landing">
  <div id="distText"></div>
  <div id="cityDots">
    <div class="city-dot dublin"><div class="dot"></div><div class="label">Dublin</div></div>
    <div class="city-dot bangalore"><div class="dot"></div><div class="label">Bangalore</div></div>
    <div id="heartbeatLine">
      <svg viewBox="0 0 500 40" preserveAspectRatio="none">
        <path d="M0,20 Q60,20 80,20 Q95,20 105,5 Q115,35 125,20 Q140,20 180,20 Q200,20 220,20 Q235,20 245,5 Q255,35 265,20 Q280,20 320,20 Q340,20 360,20 Q375,20 385,5 Q395,35 405,20 Q420,20 500,20"/>
      </svg>
    </div>
  </div>
  <div id="titleBlock">
    <h1><em>Parallel</em> Hearts</h1>
    <div class="tagline">Different skies. Same heartbeat.</div>
  </div>
  <button id="enterBtn">Enter Our World</button>
</div>

<!-- ═══ ACT 2: UNIVERSE ═══ -->
<div id="timeOverlay"></div>
<canvas id="universeCanvas"></canvas>

<div id="hud">
  <div class="hud-city">
    <div class="city-name">Dublin</div>
    <div class="city-time" id="clockDublin">--:--</div>
    <div class="city-time-period" id="periodDublin"></div>
  </div>
  <div class="hud-center">
    <div class="countdown-label">Until we meet</div>
    <div class="countdown-val" id="countdown"></div>
  </div>
  <div class="hud-city">
    <div class="city-name">Bangalore</div>
    <div class="city-time" id="clockBangalore">--:--</div>
    <div class="city-time-period" id="periodBangalore"></div>
  </div>
</div>

<button id="moonBtn"></button>

<div id="constNav">
  <div class="const-star active" data-scene="universe"><div class="star-dot"></div><div class="star-label">Home</div></div>
  <div class="const-star" data-scene="memories"><div class="star-dot"></div><div class="star-label">Memories</div></div>
  <div class="const-star" data-scene="letters"><div class="star-dot"></div><div class="star-label">Letters</div></div>
  <div class="const-star" data-scene="gallery"><div class="star-dot"></div><div class="star-label">Gallery</div></div>
  <div class="const-star" data-scene="bucketlist"><div class="star-dot"></div><div class="star-label">Bucket List</div></div>
  <div class="const-star" data-scene="music"><div class="star-dot"></div><div class="star-label">Our Music</div></div>
  <div class="const-star" data-scene="future"><div class="star-dot"></div><div class="star-label">Our Future</div></div>
  <div class="const-star" data-scene="ending"><div class="star-dot" style="opacity:0.3;border-style:dashed"></div><div class="star-label" style="opacity:0.3">...</div></div>
</div>

<button id="missBtn" title="I miss you"></button>

<div id="missPulse"></div>
<div id="missToast"><div class="miss-name" id="missName"></div><div class="miss-sub">is thinking about you</div></div>

<div id="sceneLabel"><div class="sl-name" id="slName"></div><div class="sl-hint" id="slHint"></div></div>

<div id="scrollIndicator"><div class="scroll-text">Scroll to travel through time</div><div class="scroll-line"></div></div>

<div id="audioControls">
  <button class="audio-btn" data-sound="piano" title="Piano">&#9835;</button>
  <button class="audio-btn" data-sound="rain" title="Rain">&#9729;</button>
  <button class="audio-btn" data-sound="night" title="Night">&#9789;</button>
</div>

<div id="toast"><div class="toast-text" id="toastText"></div></div>

<!-- Moon Message Overlay -->
<div id="moonOverlay">
  <div class="moon-big"></div>
  <div class="moon-date" id="moonDate"></div>
  <div class="moon-msg" id="moonMsg"></div>
  <button class="moon-close" onclick="document.getElementById('moonOverlay').classList.remove('open')">Close</button>
</div>

<!-- Letter Overlay -->
<div id="letterOverlay">
  <div class="letter-envelope">
    <button class="letter-close" onclick="document.getElementById('letterOverlay').classList.remove('open')">&#10005;</button>
    <h3>Write a Letter</h3>
    <textarea id="letterText" placeholder="Write something from the heart..."></textarea>
    <div class="letter-actions">
      <span class="letter-count" id="letterCount">0 / 250 words</span>
      <button class="letter-send" id="letterSend">Send with love</button>
    </div>
  </div>
</div>

<script type="importmap">

</script>
<script type="module">
import*as THREE from'three';

const $=id=>document.getElementById(id);

let W=window.innerWidth,H=window.innerHeight;

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
   ═══════════════════════════════════════════ */
const cursorEl=$('cursor')||createCursor();
function createCursor(){
  const c=document.createElement('div');c.id='cursor';
  c.innerHTML='<div class="cursor-dot"></div><div class="cursor-ring"></div>';
  document.body.appendChild(c);return c;
}
const glowEl=$('cursorGlow')||(()=>{const g=document.createElement('div');g.id='cursorGlow';document.body.appendChild(g);return g})();
let mouseX=W/2,mouseY=H/2,cursorX=W/2,cursorY=H/2;

const trailEls=[];const trailData=[];
for(let i=0;i<10;i++){
  const el=document.createElement('div');el.className='ct';
  const sz=3-i*.25;el.style.width=sz+'px';el.style.height=sz+'px';
  document.body.appendChild(el);trailEls.push(el);trailData.push({x:W/2,y:H/2});
}

document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;glowEl.style.left=mouseX+'px';glowEl.style.top=mouseY+'px'});
document.addEventListener('mousedown',()=>cursorEl.classList.add('click'));
document.addEventListener('mouseup',()=>cursorEl.classList.remove('click'));

function tickCursor(){
  cursorX+=(mouseX-cursorX)*.12;cursorY+=(mouseY-cursorY)*.12;
  cursorEl.style.transform=`translate(${cursorX}px,${cursorY}px)`;
  for(let i=0;i<10;i++){
    const prev=i===0?{x:cursorX,y:cursorY}:trailData[i-1];
    trailData[i].x+=(prev.x-trailData[i].x)*(.15-i*.01);
    trailData[i].y+=(prev.y-trailData[i].y)*(.15-i*.01);
    trailEls[i].style.transform=`translate(${trailData[i].x-1.5}px,${trailData[i].y-1.5}px)`;
    trailEls[i].style.opacity=(1-i/10)*.25;
  }
  /* Hover detection */
  let hovering=false;
  document.querySelectorAll('button,a,.const-star,#enterBtn,.letter-send,.letter-close,.moon-close,.audio-btn').forEach(el=>{
    const r=el.getBoundingClientRect();
    if(mouseX>=r.left-8&&mouseX<=r.right+8&&mouseY>=r.top-8&&mouseY<=r.bottom+8)hovering=true;
  });
  cursorEl.classList.toggle('hover',hovering);
  requestAnimationFrame(tickCursor);
}
tickCursor();

/* ═══════════════════════════════════════════
   ACT 1: CINEMATIC LANDING
   ═══════════════════════════════════════════ */
const REAL_DISTANCE=8580;
let landingStep=0;
const landingTimeline=[
  {delay:800,fn:()=>{
    /* Show distance counting up */
    const el=$('distText');
    el.style.opacity='1';
    let current=0;
    const target=REAL_DISTANCE;
    const duration=2500;
    const start=performance.now();
    function tick(now){
      const p=Math.min(1,(now-start)/duration);
      const ease=1-Math.pow(1-p,3);
      current=Math.floor(ease*target);
      el.innerHTML=`${current.toLocaleString()}<span class="km"> km apart</span>`;
      if(p<1)requestAnimationFrame(tick);
      else el.innerHTML=`${target.toLocaleString()}<span class="km"> km apart</span>`;
    }
    requestAnimationFrame(tick);
  }},
  {delay:3500,fn:()=>{
    /* Show city dots and heartbeat line */
    $('cityDots').style.opacity='1';
    setTimeout(()=>{$('heartbeatLine').style.opacity='1';$('heartbeatLine').classList.add('animate')},600);
  }},
  {delay:5500,fn:()=>{
    /* Fade out distance, show title */
    $('distText').style.transition='opacity 1.5s';
    $('distText').style.opacity='0';
    $('cityDots').style.transition='opacity 1.5s';
    $('cityDots').style.opacity='0';
    setTimeout(()=>{
      $('titleBlock').style.opacity='1';
      setTimeout(()=>{$('enterBtn').style.opacity='1';$('enterBtn').classList.add('show')},1200);
    },800);
  }}
];

function runLanding(){
  landingTimeline.forEach(step=>setTimeout(step.fn,step.delay));
}
runLanding();

$('enterBtn').addEventListener('click',enterUniverse);

function enterUniverse(){
  if(phase!=='landing')return;
  phase='transition';
  $('landing').classList.add('fade');
  setTimeout(()=>{
    $('landing').style.display='none';
    phase='universe';
    $('universeCanvas').classList.add('show');
    $('hud').classList.add('show');
    $('constNav').classList.add('show');
    $('missBtn').classList.add('show');
    $('audioControls').classList.add('show');
    $('moonBtn').classList.add('show');
    $('scrollIndicator').classList.add('show');
    showLabel('Your Universe','Scroll to travel through time');
    setTimeout(()=>$('scrollIndicator').classList.remove('show'),8000);
    startUniverse();
  },2000);
}

const renderer=new THREE.WebGLRenderer({canvas:$('universeCanvas'),antialias:true,alpha:true});

cam.position.set(0,0,8);

const sc=new THREE.Scene();
sc.background=new THREE.Color(0x020510);
sc.fog=new THREE.FogExp2(0x020510,0.008);

/* ── Lighting ── */

const sunLight=new THREE.DirectionalLight(0xffeedd,.3);
sunLight.position.set(-5,8,5);sc.add(sunLight);

/* ── Star Field (background) ── */
const starN=2000;
const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(starN*3);
const starSz=new Float32Array(starN);
const starCol=new Float32Array(starN*3);
for(let i=0;i<starN;i++){
  const theta=Math.random()*TAU,phi=Math.acos(2*Math.random()-1);
  const r=20+Math.random()*80;
  starPos[i*3]=r*Math.sin(phi)*Math.cos(theta);
  starPos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
  starPos[i*3+2]=r*Math.cos(phi);
  starSz[i]=Math.random()*2+.5;
  const temp=Math.random();
  starCol[i*3]=.9+temp*.1;starCol[i*3+1]=.85+temp*.1;starCol[i*3+2]=.8+temp*.2;
}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('size',new THREE.BufferAttribute(starSz,1));
starGeo.setAttribute('color',new THREE.BufferAttribute(starCol,3));
const starMat=new THREE.ShaderMaterial({
  uniforms:{time:{value:0}},
  vertexShader:`attribute float size;attribute vec3 color;varying vec3 vC;varying float vA;uniform float time;void main(){vC=color;vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=size*(200./-mv.z);gl_Position=projectionMatrix*mv;vA=.6+.4*sin(time*.5+position.x*.1+position.y*.1);}`,
  fragmentShader:`varying vec3 vC;varying float vA;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;float g=1.-smoothstep(0.,.5,d);gl_FragColor=vec4(vC,g*vA);}`,
  transparent:true,blending:THREE.AdditiveBlending,depthWrite:false
});
const stars=new THREE.Points(starGeo,starMat);
sc.add(stars);

/* ── Shared Moon ── */
const moonGroup=new THREE.Group();
const moonMesh=new THREE.Mesh(
  new THREE.SphereGeometry(1.2,32,32),
  new THREE.MeshBasicMaterial({color:0xeeeedd})
);
moonGroup.add(moonMesh);
const moonGlow=new THREE.Mesh(
  new THREE.SphereGeometry(2,32,32),
  new THREE.ShaderMaterial({
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vN;void main(){float i=pow(.6-dot(vN,vec3(0,0,1)),3.);gl_FragColor=vec4(.7,.72,.8,i*.35);}`,
    transparent:true,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false
  })
);
moonGroup.add(moonGlow);
moonGroup.position.set(0,4,-15);
sc.add(moonGroup);

/* ── Constellation Lines (connecting nav stars) ── */
const constGroup=new THREE.Group();
const constStars=[];
const constLabels=['Home','Memories','Letters','Gallery','Bucket List','Our Music','Our Future'];
const constPositions=[
  [0,0,0],[3,2,-2],[-2,3,-1],[4,-1,-3],[-3,-2,-2],[1,-3,-1],[-4,1,-2]
];

constPositions.forEach((p,i)=>{
  const star=new THREE.Mesh(
    new THREE.SphereGeometry(i===0?.08:.05,12,12),
    new THREE.MeshBasicMaterial({
      color:i===0?0xffcc66:0xc8a855,
      transparent:true,opacity:i===0?1:.5,
      blending:THREE.AdditiveBlending,depthWrite:false
    })
  );
  star.position.set(...p);
  constGroup.add(star);constStars.push(star);
});

/* Lines between adjacent stars */
for(let i=0;i<constPositions.length-1;i++){
  const a=new THREE.Vector3(...constPositions[i]);
  const b=new THREE.Vector3(...constPositions[i+1]);
  const mid=a.clone().add(b).multiplyScalar(.5).add(new THREE.Vector3(0,.3,0));
  const curve=new THREE.QuadraticBezierCurve3(a,mid,b);
  const pts=curve.getPoints(30);
  const lineGeo=new THREE.BufferGeometry().setFromPoints(pts);
  const lineMat=new THREE.LineBasicMaterial({color:0xc8a855,transparent:true,opacity:.1,blending:THREE.AdditiveBlending,depthWrite:false});
  constGroup.add(new THREE.Line(lineGeo,lineMat));
}

/* Unfinished constellation (the ending) */
const endingStarPositions=[[-3,3,-4],[-2,4,-5],[-1,3.5,-4.5],[0,4.5,-5.5],[1,3.8,-4.8],[2,4.2,-5.2],[3,3.5,-4.5]];
const endingLinePositions=[[-3,3,-4],[-2,4,-5],[-1,3.5,-4.5],[0,4.5,-5.5],[1,3.8,-4.8],[2,4.2,-5.2],[3,3.5,-4.5]];
/* Last star is dim/dashed — the unfinished one */
const lastStarPos=endingStarPositions[endingStarPositions.length-1];
const lastStar=new THREE.Mesh(
  new THREE.SphereGeometry(.02,8,8),
  new THREE.MeshBasicMaterial({color:0xc8a855,transparent:true,opacity:.15,blending:THREE.AdditiveBlending,depthWrite:false})
);
lastStar.position.set(...lastStarPos);
constGroup.add(lastStar);

/* Lines for ending constellation (except last segment) */
for(let i=0;i<endingLinePositions.length-2;i++){
  const a=new THREE.Vector3(...endingLinePositions[i]);
  const b=new THREE.Vector3(...endingLinePositions[i+1]);
  const pts=[a,b];
  const lineGeo=new THREE.BufferGeometry().setFromPoints(pts);
  const lineMat=new THREE.LineBasicMaterial({color:0xc8a855,transparent:true,opacity:.08,blending:THREE.AdditiveBlending,depthWrite:false});
  constGroup.add(new THREE.Line(lineGeo,lineMat));
}
/* Dashed last segment */
const dashPts=[new THREE.Vector3(...endingLinePositions[endingLinePositions.length-2]),new THREE.Vector3(...lastStarPos)];
const dashGeo=new THREE.BufferGeometry().setFromPoints(dashPts);
const dashMat=new THREE.LineDashedMaterial({color:0xc8a855,transparent:true,opacity:.06,dashSize:.2,gapSize:.15,blending:THREE.AdditiveBlending,depthWrite:false});
const dashLine=new THREE.Line(dashGeo,dashMat);
dashLine.computeLineDistances();
constGroup.add(dashLine);

constGroup.position.set(0,0,-5);
sc.add(constGroup);

/* ── Drifting Clouds ── */
const clouds=[];
for(let i=0;i<8;i++){

/* ═══════════════════════════════════════════
   TIME OF DAY SYSTEM (Scroll-based)
   ═══════════════════════════════════════════ */
/* Dublin hours: 6am(dawn)→12pm(noon)→17pm(golden)→22pm(night) */
/* Bangalore: +5:30 offset, different sky color */
const timeColors={
  dawn:{bg:0x0a1020,ambient:0x4a6090,sky:'linear-gradient(180deg, #0a1020 0%, #1a2a4a 40%, #3a4a6a 70%, #6a7a9a 100%)'},
  morning:{bg:0x101828,ambient:0x8090a0,sky:'linear-gradient(180deg, #101828 0%, #2a3a5a 40%, #5a7a9a 100%)'},
  noon:{bg:0x182030,ambient:0xaab0b8,sky:'linear-gradient(180deg, #182030 0%, #3a5070 40%, #7090b0 100%)'},
  golden:{bg:0x1a1820,ambient:0xc8a855,sky:'linear-gradient(180deg, #1a1820 0%, #3a2a20 40%, #8a5a30 70%, #c8a060 100%)'},
  dusk:{bg:0x12101a,ambient:0x6a5080,sky:'linear-gradient(180deg, #12101a 0%, #2a1a30 40%, #4a2a40 70%, #6a4a50 100%)'},
  night:{bg:0x050810,ambient:0x202040,sky:'linear-gradient(180deg, #050810 0%, #0a1020 40%, #101830 100%)'}
};

function getTimeOfDay(hour){
  if(hour<7)return'dawn';if(hour<11)return'morning';if(hour<15)return'noon';
  if(hour<18)return'golden';if(hour<20)return'dusk';return'night';
}

function getTimePeriodName(hour){
  if(hour<7)return'Dawn';if(hour<11)return'Morning';if(hour<15)return'Afternoon';
  if(hour<18)return'Golden Hour';if(hour<20)return'Dusk';return'Night';
}

function updateTimeOfDay(){
  if(phase!=='universe')return;
  const now=new Date();
  const dublinHour=parseInt(new Intl.DateTimeFormat('en-IE',{timeZone:'Europe/Dublin',hour:'numeric',hour12:false}).format(now));
  const bangaloreHour=parseInt(new Intl.DateTimeFormat('en-IN',{timeZone:'Asia/Kolkata',hour:'numeric',hour12:false}).format(now));

  /* Use scroll to blend between time periods */
  const dublinPeriod=getTimeOfDay((dublinHour+Math.floor(scrollProgress*16))%24);
  const colors=timeColors[dublinPeriod];

  sc.background.set(colors.bg);
  sc.fog.color.set(colors.bg);
  sunLight.color.set(colors.ambient);

  $('timeOverlay').style.background=colors.sky;
  $('timeOverlay').style.opacity=.15;

  /* Update period labels */
  const dp=getTimePeriodName((dublinHour+Math.floor(scrollProgress*16))%24);
  const bp=getTimePeriodName((bangaloreHour+Math.floor(scrollProgress*16))%24);
  $('periodDublin').textContent=dp;
  $('periodBangalore').textContent=bp;
}

/* ═══════════════════════════════════════════
   FIREFLY NOTIFICATIONS
   ═══════════════════════════════════════════ */
const fireflies=[];
function spawnFirefly(msg){
  const el=document.createElement('div');
  el.className='firefly';
  el.title='A message from Sharath';
  const startX=Math.random()*W*.6+W*.2;
  const startY=H+20;
  el.style.left=startX+'px';el.style.top=startY+'px';
  document.body.appendChild(el);

  const flyData={el,x:startX,y:startY,vx:(Math.random()-.5)*2,vy:-1-Math.random()*2,phase:Math.random()*TAU,msg};
  fireflies.push(flyData);

  el.addEventListener('click',()=>{
    el.classList.add('opening');
    setTimeout(()=>{
      el.remove();
      fireflies.splice(fireflies.indexOf(flyData),1);
      showToast(msg);
    },800);
  });
}

function tickFireflies(){
  fireflies.forEach(f=>{
    f.phase+=.02;
    f.x+=Math.sin(f.phase)*1.5+f.vx;
    f.y+=Math.cos(f.phase*.7)*.8+f.vy;
    if(f.y<-20){f.y=H+20;f.x=Math.random()*W*.6+W*.2}
    f.el.style.left=f.x+'px';f.el.style.top=f.y+'px';
    f.el.style.opacity=.5+.5*Math.sin(f.phase*3);
  });
}

/* ═══════════════════════════════════════════
   PAPER AIRPLANE LETTERS
   ═══════════════════════════════════════════ */
function sendPaperAirplane(text){
  const plane=document.createElement('div');
  plane.className='paper-plane';
  document.body.appendChild(plane);

  const startX=W*.5;
  const startY=H*.5;
  plane.style.left=startX+'px';plane.style.top=startY+'px';

  const endX=W*.15;
  const endY=H*.15;
  const duration=3000;
  const start=performance.now();

  function anim(now){
    const p=Math.min(1,(now-start)/duration);
    const ease=1-Math.pow(1-p,3);
    const x=startX+(endX-startX)*ease;
    const y=startY+(endY-startY)*ease-Math.sin(p*PI)*150;
    const rot=-45+p*360;
    plane.style.left=x+'px';
    plane.style.top=y+'px';
    plane.style.transform=`rotate(${rot}deg) scale(${1-p*.5})`;
    plane.style.opacity=1-p*.7;
    if(p<1)requestAnimationFrame(anim);
    else{plane.remove();showToast('✉️ Letter sent across the stars')}
  }
  requestAnimationFrame(anim);
}

let audioCtx=null;const activeSounds={};
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}

function createPiano(){if(activeSounds.piano)return stopSound('piano');initAudio();const o1=audioCtx.createOscillator(),o2=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();o1.type='sine';o1.frequency.value=220;o2.type='sine';o2.frequency.value=330;f.type='lowpass';f.frequency.value=400;g.gain.value=0;o1.connect(f);o2.connect(f);f.connect(g);g.connect(audioCtx.destination);o1.start();o2.start();g.gain.linearRampToValueAtTime(.03,audioCtx.currentTime+2);const lfo=audioCtx.createOscillator(),lg=audioCtx.createGain();lfo.frequency.value=.1;lg.gain.value=20;lfo.connect(lg);lg.connect(o1.frequency);lfo.start();activeSounds.piano={osc:[o1,o2],gain:g};document.querySelector('[data-sound="piano"]').classList.add('active')}

function createRain(){if(activeSounds.rain)return stopSound('rain');initAudio();const buf=audioCtx.createBuffer(1,2*audioCtx.sampleRate,audioCtx.sampleRate),d=buf.getChannelData(0);let last=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;d[i]=(last+.02*w)/1.02;last=d[i];d[i]*=3.5}const n=audioCtx.createBufferSource();n.buffer=buf;n.loop=true;const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=.5;const g=audioCtx.createGain();g.gain.value=0;n.connect(f);f.connect(g);g.connect(audioCtx.destination);n.start();g.gain.linearRampToValueAtTime(.04,audioCtx.currentTime+2);activeSounds.rain={noise:n,gain:g};document.querySelector('[data-sound="rain"]').classList.add('active')}

function createNight(){if(activeSounds.night)return stopSound('night');initAudio();const o=audioCtx.createOscillator(),o2=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=440;o2.type='triangle';o2.frequency.value=554;g.gain.value=0;o.connect(g);o2.connect(g);g.connect(audioCtx.destination);o.start();o2.start();g.gain.linearRampToValueAtTime(.015,audioCtx.currentTime+3);activeSounds.night={osc:[o,o2],gain:g};document.querySelector('[data-sound="night"]').classList.add('active')}

function stopSound(type){const s=activeSounds[type];if(!s)return;if(s.gain)s.gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1);setTimeout(()=>{if(s.osc)(Array.isArray(s.osc)?s.osc:[s.osc]).forEach(o=>{try{o.stop()}catch(e){}});if(s.noise)try{s.noise.stop()}catch(e){}},1100);delete activeSounds[type];document.querySelector(`[data-sound="${type}"]`)?.classList.remove('active')}

document.querySelectorAll('.audio-btn').forEach(btn=>btn.addEventListener('click',()=>{
  const s=btn.dataset.sound;if(s==='piano')createPiano();if(s==='rain')createRain();if(s==='night')createNight();
}));

/* ═══════════════════════════════════════════
   UNIVERSE RENDER LOOP
   ═══════════════════════════════════════════ */
const clock=new THREE.Clock();
function startUniverse(){
  function animate(){
    requestAnimationFrame(animate);
    delta=Math.min(clock.getDelta(),.05);
    time+=delta;

    /* Stars slow drift */
    stars.rotation.y=time*.003;
    stars.rotation.x=Math.sin(time*.01)*.002;
    starMat.uniforms.time.value=time;

    /* Moon gentle bob */
    moonGroup.position.y=4+Math.sin(time*.2)*.3;
    moonGroup.rotation.y=time*.05;

    /* Clouds drift */
    clouds.forEach(c=>{
      c.position.x+=c.userData.speed;
      c.position.y+=c.userData.driftY;
      if(c.position.x>20)c.position.x=-20;
    });

    /* Constellation stars pulse */
    constStars.forEach((s,i)=>{
      const pulse=.5+.5*Math.sin(time*1.5+i*1.2);
      s.material.opacity=(i===0?.8:.3)+pulse*.2;
      s.scale.setScalar(1+pulse*.1);
    });

    /* Unfinished star faint pulse */
    lastStar.material.opacity=.05+.1*Math.sin(time*.5);
    lastStar.scale.setScalar(.8+.2*Math.sin(time*.5));

    /* Fireflies */
    tickFireflies();

    cam.position.x=Math.sin(time*.05)*.3;
    cam.position.y=Math.cos(time*.03)*.2;
    cam.lookAt(0,0,-5);

    composer.render();
  }
  animate();
}

/* Post-processing */
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';
import{ShaderPass}from'three/addons/postprocessing/ShaderPass.js';

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(sc,cam));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W,H),.6,.4,.85));
const vigShader={uniforms:{tDiffuse:{value:null}},vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,fragmentShader:`uniform sampler2D tDiffuse;varying vec2 vUv;void main(){vec4 t=texture2D(tDiffuse,vUv);vec2 u=(vUv-.5)*1.1;float v=1.-dot(u,u);t.rgb*=smoothstep(0.,1.,v/1.3);gl_FragColor=t;}`};
composer.addPass(new ShaderPass(vigShader));

/* ═══════════════════════════════════════════
   RESIZE
   ═══════════════════════════════════════════ */
window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  cam.aspect=W/H;cam.updateProjectionMatrix();
  renderer.setSize(W,H);composer.setSize(W,H);
});

/* ═══════════════════════════════════════════
   EASTER EGGS
   ═══════════════════════════════════════════ */
let easterClicks=0;
document.addEventListener('keydown',e=>{
  if(e.key==='l'||e.key==='L'){easterClicks++;if(easterClicks>=5){showToast('The tree remembers.');easterClicks=0}}
  if(e.key==='m'||e.key==='M')showToast('Same moon.');
  if(e.key==='h'||e.key==='H')receiveMissYou();
});

/* ═══════════════════════════════════════════
   DEMO: Spawn a firefly after 15 seconds
   ═══════════════════════════════════════════ */
setTimeout(()=>{if(phase==='universe')spawnFirefly('Missing you from Bangalore')},15000);
</script>
