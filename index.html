<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parallel Hearts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#f0e6d2;font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;cursor:none}
::selection{background:#c8a855;color:#050816}

#cursor{position:fixed;pointer-events:none;z-index:9999}
#cursor .d{width:5px;height:5px;background:#c8a855;border-radius:50%;position:absolute;top:-2.5px;left:-2.5px;transition:transform .15s}
#cursor .r{width:32px;height:32px;border:1px solid rgba(200,168,85,.3);border-radius:50%;position:absolute;top:-16px;left:-16px;transition:transform .3s cubic-bezier(.16,1,.3,1),width .3s,height .3s,top .3s,left .3s,border-color .3s}
#cursor.hov .d{transform:scale(0)}
#cursor.hov .r{width:48px;height:48px;top:-24px;left:-24px;border-color:rgba(200,168,85,.5)}
.ct{position:fixed;pointer-events:none;z-index:9998;border-radius:50%;background:#c8a855;mix-blend-mode:screen}
#cGlow{position:fixed;pointer-events:none;z-index:4;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,85,.02) 0%,transparent 70%);transform:translate(-50%,-50%)}

/* ── Landing ── */
#landing{position:fixed;inset:0;z-index:50;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 2.5s cubic-bezier(.16,1,.3,1)}
#landing.out{opacity:0;pointer-events:none}
#landCanvas{position:absolute;inset:0;width:100%;height:100%}
#titleBlock{text-align:center;position:relative;z-index:2;opacity:0;transition:opacity 2.5s cubic-bezier(.16,1,.3,1)}
#titleBlock h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(34px,7vw,76px);font-weight:300;letter-spacing:.03em;line-height:1.05;color:#f0e6d2}
#titleBlock h1 em{font-style:italic;color:#c8a855}
#enterBtn{margin-top:36px;padding:11px 28px;border:1px solid rgba(200,168,85,.15);border-radius:28px;background:transparent;color:#c8a855;font-family:'Inter',sans-serif;font-size:10px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;opacity:0;transition:all .5s cubic-bezier(.16,1,.3,1);position:relative;z-index:2}
#enterBtn:hover{background:rgba(200,168,85,.04);border-color:rgba(200,168,85,.35);transform:scale(1.03)}
#enterBtn.show{animation:br 3s ease-in-out infinite}
@keyframes br{0%,100%{opacity:.35}50%{opacity:.9}}

/* ── Main View ── */
#mainCanvas{position:fixed;inset:0;z-index:1;opacity:0;transition:opacity 3s}
#mainCanvas.on{opacity:1}
#skyCanvas{position:fixed;inset:0;z-index:0}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:12;display:flex;justify-content:space-between;align-items:flex-start;padding:20px 28px;opacity:0;transition:opacity 1.5s;pointer-events:none}
#hud.on{opacity:1;pointer-events:auto}
.hc{text-align:right}.hc:first-child{text-align:left}
.hc .cn{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:rgba(200,168,85,.25);font-weight:300}
.hc .ct2{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(15px,2vw,22px);font-weight:300;color:#f0e6d2;letter-spacing:.02em}
.hc .cd2{font-size:9px;color:rgba(200,168,85,.2);margin-top:1px;letter-spacing:.08em}
.hcc{text-align:center}
.hcc .cl{font-size:7px;letter-spacing:.22em;text-transform:uppercase;color:rgba(200,168,85,.2);font-weight:300}
.hcc .cv{font-family:'Cormorant Garamond',Georgia,serif;font-size:12px;color:rgba(240,230,210,.3);margin-top:2px}

/* ── Side Stars (Constellation Nav) ── */
#sideNav{position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:12;display:flex;flex-direction:column;gap:0;opacity:0;transition:opacity 1.5s;pointer-events:none}
#sideNav.on{opacity:1;pointer-events:auto}
.sn{display:flex;align-items:center;gap:10px;cursor:pointer;padding:7px 0;transition:all .4s}
.sn .sd{width:5px;height:5px;border-radius:50%;border:1px solid rgba(200,168,85,.2);background:transparent;transition:all .4s;flex-shrink:0}
.sn .sl{font-size:8px;letter-spacing:.14em;color:rgba(200,168,85,.15);font-weight:300;transition:color .4s;text-transform:uppercase;white-space:nowrap}
.sn:hover .sd{border-color:rgba(200,168,85,.5);background:rgba(200,168,85,.1);transform:scale(1.3)}
.sn:hover .sl{color:rgba(200,168,85,.5)}
.sn.act .sd{background:#c8a855;border-color:#c8a855;box-shadow:0 0 10px rgba(200,168,85,.3)}
.sn.act .sl{color:#c8a855}

/* ── Moon ── */
#moonEl{position:fixed;z-index:12;cursor:pointer;opacity:0;transition:opacity .5s,brightness .3s;pointer-events:none}
#moonEl.on{opacity:1;pointer-events:auto}
#moonEl:hover{filter:brightness(1.2)}

/* ── Moon Overlay ── */
#moonOv{position:fixed;inset:0;z-index:20;background:rgba(2,4,12,.92);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;visibility:hidden;transition:all .8s cubic-bezier(.16,1,.3,1)}
#moonOv.open{opacity:1;visibility:visible}
#moonOv .mbig{border-radius:50%;box-shadow:0 0 50px rgba(200,200,180,.1);margin-bottom:28px}
#moonOv .mdt{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#c8a855;margin-bottom:12px}
#moonOv .mmsg{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(16px,2.5vw,24px);font-weight:300;color:#f0e6d2;text-align:center;max-width:460px;line-height:1.6;font-style:italic}
#moonOv .mcl{margin-top:36px;padding:7px 20px;border:1px solid rgba(200,168,85,.12);border-radius:18px;background:transparent;color:#c8a855;font-size:9px;letter-spacing:.15em;cursor:pointer;transition:all .3s}
#moonOv .mcl:hover{border-color:rgba(200,168,85,.35);background:rgba(200,168,85,.04)}

/* ── I Miss You ── */
#missBtn{position:fixed;bottom:36px;right:28px;z-index:12;width:44px;height:44px;border-radius:50%;border:1px solid rgba(200,168,85,.1);background:rgba(0,0,0,.3);backdrop-filter:blur(12px);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .5s cubic-bezier(.16,1,.3,1);pointer-events:none}
#missBtn.on{opacity:.4;pointer-events:auto}
#missBtn:hover{opacity:.9;border-color:rgba(200,168,85,.3);transform:scale(1.06)}
#missBtn svg{width:18px;height:18px}
#missBtn.puls{animation:hp 1.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes hp{0%{transform:scale(1)}20%{transform:scale(1.2);box-shadow:0 0 30px rgba(200,168,85,.25)}100%{transform:scale(1)}}

/* ── Miss Pulse ── */
#missPulse{position:fixed;inset:0;z-index:11;background:radial-gradient(ellipse at center,rgba(200,168,85,.06) 0%,transparent 70%);opacity:0;pointer-events:none;transition:opacity .5s}
#missPulse.on{opacity:1}
#missToast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;text-align:center;opacity:0;pointer-events:none;transition:opacity .6s}
#missToast.on{opacity:1}
#missToast .mn{font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;color:#c8a855;font-weight:300;letter-spacing:.04em}
#missToast .ms{font-size:9px;color:rgba(240,230,210,.35);letter-spacing:.15em;margin-top:3px}

/* ── Letter System ── */
#letOv{position:fixed;inset:0;z-index:20;background:rgba(2,4,12,.94);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .8s cubic-bezier(.16,1,.3,1)}
#letOv.open{opacity:1;visibility:visible}
.letEnv{width:min(600px,92vw);max-height:80vh;background:linear-gradient(145deg,rgba(12,14,24,.95),rgba(8,10,20,.98));border:1px solid rgba(200,168,85,.08);border-radius:16px;padding:0;transform:translateY(24px) scale(.97);transition:transform .8s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;display:flex;flex-direction:column}
#letOv.open .letEnv{transform:translateY(0) scale(1)}
.letX{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.01);color:rgba(240,230,210,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;z-index:2}
/* Letter Tabs */
.letTabs{display:flex;border-bottom:1px solid rgba(200,168,85,.06);padding:0 24px}
.letTab{padding:14px 20px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(200,168,85,.25);cursor:pointer;border-bottom:1px solid transparent;transition:all .3s;font-weight:300}
.letTab:hover{color:rgba(200,168,85,.5)}
.letTab.active{color:#c8a855;border-bottom-color:#c8a855}
.letTab .badge{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c8a855;margin-left:6px;opacity:0;transition:opacity .3s}
.letTab .badge.on{opacity:1}
/* Letter Panels */
.letPanels{flex:1;overflow-y:auto;padding:20px 24px;scrollbar-width:thin;scrollbar-color:rgba(200,168,85,.1) transparent}
.letPanel{display:none}
.letPanel.active{display:block}
/* Inbox */
.letItem{padding:14px 16px;border:1px solid rgba(200,168,85,.05);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:all .3s;position:relative}
.letItem:hover{border-color:rgba(200,168,85,.15);background:rgba(200,168,85,.02)}
.letItem.unread{border-left:2px solid #c8a855}
.letItem .li-from{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;color:#f0e6d2;font-weight:300}
.letItem .li-preview{font-size:11px;color:rgba(240,230,210,.3);margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.letItem .li-date{font-size:8px;color:rgba(200,168,85,.2);margin-top:6px;letter-spacing:.1em}
.letItem .li-dot{position:absolute;top:18px;right:14px;width:6px;height:6px;border-radius:50%;background:#c8a855;opacity:0;transition:opacity .3s}
.letItem.unread .li-dot{opacity:.6}
/* Letter Read View */
.letRead{display:none;padding:24px}
.letRead.active{display:block}
.letRead .lr-back{font-size:9px;color:rgba(200,168,85,.3);cursor:pointer;letter-spacing:.1em;margin-bottom:16px;display:inline-block;transition:color .3s}
.letRead .lr-back:hover{color:#c8a855}
.letRead .lr-from{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;color:#c8a855;font-weight:300}
.letRead .lr-date{font-size:8px;color:rgba(200,168,85,.2);letter-spacing:.1em;margin-top:4px}
.letRead .lr-body{font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;color:#f0e6d2;line-height:1.9;margin-top:20px;font-weight:300;white-space:pre-wrap}
.letRead .lr-sig{font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;color:#c8a855;margin-top:24px;font-style:italic;text-align:right}
/* Write Letter */
.letWrite{display:none;padding:24px}
.letWrite.active{display:block}
.letWrite h3{font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-weight:300;color:#c8a855;margin-bottom:14px}
.letWrite textarea{width:100%;min-height:140px;border:none;background:transparent;color:#f0e6d2;font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;line-height:1.8;resize:none;outline:none}
.letWrite textarea::placeholder{color:rgba(240,230,210,.1);font-style:italic}
.letWrite .letAct{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.02)}
.letWrite .letCnt{font-size:9px;color:rgba(240,230,210,.2);letter-spacing:.08em}
.letSend{padding:7px 18px;border:1px solid rgba(200,168,85,.15);border-radius:20px;background:rgba(200,168,85,.03);color:#c8a855;font-size:9px;cursor:pointer;transition:all .3s;letter-spacing:.06em}
.letSend:hover{background:rgba(200,168,85,.08);border-color:rgba(200,168,85,.3)}
/* Empty State */
.letEmpty{text-align:center;padding:40px 20px;color:rgba(200,168,85,.15);font-size:11px;letter-spacing:.1em;font-style:italic}

/* ── Firefly ── */
.ff{position:fixed;z-index:15;width:6px;height:6px;border-radius:50%;background:#c8a855;box-shadow:0 0 10px rgba(200,168,85,.4),0 0 20px rgba(200,168,85,.15);pointer-events:auto;cursor:pointer;transition:box-shadow .3s}
.ff:hover{box-shadow:0 0 20px rgba(200,168,85,.6),0 0 40px rgba(200,168,85,.25)}
.ff.open{animation:fLand .7s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fLand{0%{transform:scale(1)}50%{transform:scale(1.8);box-shadow:0 0 30px rgba(200,168,85,.5)}100%{transform:scale(0);opacity:0}}

/* ── Paper Plane ── */
.pp{position:fixed;z-index:15;pointer-events:none;opacity:0}

/* ── Toast ── */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);z-index:20;background:rgba(5,8,18,.9);backdrop-filter:blur(20px);border:1px solid rgba(200,168,85,.08);border-radius:14px;padding:18px 28px;text-align:center;opacity:0;pointer-events:none;transition:all .5s cubic-bezier(.16,1,.3,1)}
#toast.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
#toast .tt{font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;color:#f0e6d2;font-weight:300}

/* ── Photo Viewer ── */
#photoViewer{position:fixed;inset:0;z-index:25;background:rgba(2,4,12,.95);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;visibility:hidden;transition:all .6s cubic-bezier(.16,1,.3,1);cursor:pointer}
#photoViewer.open{opacity:1;visibility:visible}
#photoViewer img{max-width:85vw;max-height:70vh;object-fit:contain;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.5);transition:transform .4s}
#photoViewer .pv-date{font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;color:#c8a855;letter-spacing:.1em;margin-top:16px;font-weight:300}
#photoViewer .pv-caption{font-size:11px;color:rgba(240,230,210,.3);margin-top:6px;letter-spacing:.08em;font-style:italic}
#photoViewer .pv-close{position:absolute;top:20px;right:24px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:rgba(240,230,210,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;pointer-events:auto}
#photoViewer .pv-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:1px solid rgba(200,168,85,.1);background:rgba(0,0,0,.3);color:#c8a855;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;pointer-events:auto;transition:all .3s}
#photoViewer .pv-nav:hover{border-color:rgba(200,168,85,.3);background:rgba(200,168,85,.05)}
#photoViewer .pv-prev{left:20px}
#photoViewer .pv-next{right:20px}
#photoViewer .pv-count{position:absolute;bottom:20px;font-size:9px;color:rgba(200,168,85,.2);letter-spacing:.15em}

/* ── Memory Galaxy Overlay ── */
#memGal{position:fixed;inset:0;z-index:22;background:rgba(2,4,12,.96);opacity:0;visibility:hidden;transition:all .8s cubic-bezier(.16,1,.3,1)}
#memGal.open{opacity:1;visibility:visible}
#memGal canvas{width:100%;height:100%}
#memGal .mg-title{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;color:#c8a855;font-weight:300;letter-spacing:.06em}
#memGal .mg-hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(200,168,85,.2);letter-spacing:.15em}
#memGal .mg-close{position:absolute;top:20px;right:24px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:rgba(240,230,210,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}

/* ── Memory Star Tooltip ── */
.memTooltip{position:fixed;z-index:23;background:rgba(5,8,18,.9);backdrop-filter:blur(12px);border:1px solid rgba(200,168,85,.1);border-radius:10px;padding:10px 14px;pointer-events:none;opacity:0;transition:opacity .3s;max-width:200px}
.memTooltip.show{opacity:1}
.memTooltip .mt-date{font-size:8px;color:#c8a855;letter-spacing:.12em;text-transform:uppercase}
.memTooltip .mt-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;color:#f0e6d2;margin-top:2px;font-weight:300}
.memTooltip .mt-thumb{width:60px;height:40px;object-fit:cover;border-radius:4px;margin-top:6px;opacity:.8}

/* ── Audio ── */
#audio{position:fixed;bottom:36px;left:28px;z-index:12;display:flex;gap:6px;opacity:0;transition:opacity 1.5s;pointer-events:none}
#audio.on{opacity:1;pointer-events:auto}
.ab{width:26px;height:26px;border-radius:50%;border:1px solid rgba(200,168,85,.08);background:rgba(0,0,0,.2);color:rgba(184,197,214,.4);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.ab:hover{border-color:rgba(200,168,85,.25);color:#c8a855}
.ab.act{background:rgba(200,168,85,.05);border-color:rgba(200,168,85,.15);color:#c8a855}

/* ── Scene Label ── */
#sLab{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:12;opacity:0;transition:opacity 1.5s;pointer-events:none;text-align:center}
#sLab.on{opacity:1}
.sn2{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(13px,1.8vw,16px);font-weight:300;color:#c8a855;letter-spacing:.06em}
.sh2{font-size:8px;color:rgba(240,230,210,.15);margin-top:3px;letter-spacing:.15em;font-weight:300}

/* ── Scroll Hint ── */
#scrlH{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:12;text-align:center;opacity:0;transition:opacity 1s;pointer-events:none}
#scrlH.on{opacity:1}
#scrlH .st{font-size:7px;letter-spacing:.22em;text-transform:uppercase;color:rgba(200,168,85,.15);margin-bottom:6px}
#scrlH .sl{width:1px;height:20px;background:linear-gradient(to bottom,rgba(200,168,85,.2),transparent);margin:0 auto;animation:sp 2.5s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.2;transform:scaleY(1)}50%{opacity:.6;transform:scaleY(1.2)}}

/* ── Time Overlay ── */
#timeOv{position:fixed;inset:0;z-index:0;pointer-events:none;transition:background 3s}

/* ── Scroll Progress Bar ── */
#scrollBar{position:fixed;right:0;top:0;width:2px;height:0;background:linear-gradient(to bottom,rgba(200,168,85,.3),rgba(200,168,85,.1));z-index:12;transition:height .3s;pointer-events:none}

@media(max-width:768px){
  #hud{padding:14px 16px}
  .hcc{display:none}
  #sideNav{right:10px}.sn .sl{display:none}
  #missBtn{bottom:20px;right:16px;width:38px;height:38px}
  #audio{bottom:20px;left:16px}
}
</style>
</head>
<body>

<canvas id="skyCanvas"></canvas>
<canvas id="mainCanvas"></canvas>

<!-- Landing -->
<div id="landing">
  <canvas id="landCanvas"></canvas>
  <div id="titleBlock"><h1><em>Parallel</em> Hearts</h1></div>
  <button id="enterBtn">Enter Our World</button>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hc"><div class="cn">Dublin</div><div class="ct2" id="clDub">--:--</div><div class="cd2" id="weDub"></div></div>
  <div class="hcc"><div class="cl">Until we meet</div><div class="cv" id="cdVal"></div></div>
  <div class="hc"><div class="cn">Bangalore</div><div class="ct2" id="clBan">--:--</div><div class="cd2" id="weBan"></div></div>
</div>

<!-- Constellation Nav -->
<div id="sideNav">
  <div class="sn act" data-s="home"><div class="sd"></div><div class="sl">Home</div></div>
  <div class="sn" data-s="memories"><div class="sd"></div><div class="sl">Memories</div></div>
  <div class="sn" data-s="letters"><div class="sd"></div><div class="sl">Letters</div></div>
  <div class="sn" data-s="gallery"><div class="sd"></div><div class="sl">Gallery</div></div>
  <div class="sn" data-s="bucket"><div class="sd"></div><div class="sl">Bucket List</div></div>
  <div class="sn" data-s="music"><div class="sd"></div><div class="sl">Our Music</div></div>
  <div class="sn" data-s="future"><div class="sd"></div><div class="sl">Our Future</div></div>
  <div class="sn" data-s="ending"><div class="sd" style="opacity:.2;border-style:dashed"></div><div class="sl" style="opacity:.2">...</div></div>
</div>

<!-- Moon -->
<div id="moonEl"></div>

<!-- I Miss You -->
<button id="missBtn" title="I miss you">

/* ═══════════════════════════════════════════
   REAL-TIME ASTRONOMICAL CALCULATIONS
   ═══════════════════════════════════════════ */

/* Julian Date */
function toJD(date){const y=date.getUTCFullYear(),m=date.getUTCMonth()+1,d=date.getUTCDate()+date.getUTCHours()/24+date.getUTCMinutes()/1440;let Y=y,M=m;if(M<=2){Y--;M+=12}const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+d+B-1524.5}

/* Sun position (simplified) */
function sunPos(date,lat,lng){
  const jd=toJD(date),T=(jd-2451545)/36525;
  const L0=(280.46646+T*(36000.76983+T*.0003032))%360;
  const M=(357.52911+T*(35999.05029-.0001537*T))%360;
  const Mr=M*PI/180;
  const C=(1.9146-.004817*T-.000014*T*T)*Math.sin(Mr)+(0.019993-.000101*T)*Math.sin(2*Mr)+.00029*Math.sin(3*Mr);
  const sunLon=(L0+C)*PI/180;
  const obliquity=(23.439-0.00000036*T)*PI/180;
  const decl=Math.asin(Math.sin(obliquity)*Math.sin(sunLon));
  const RA=Math.atan2(Math.cos(obliquity)*Math.sin(sunLon),Math.cos(sunLon));
  const GMST=(6.697375+.06570982441908*djd(T)+1.00273790935+.000026*(T*T))*15*PI/180;
  const djd=(jd-2451545);
  let HA=GMST+lng*PI/180-RA;while(HA>PI)HA-=TAU;while(HA<-PI)HA+=TAU;
  const latR=lat*PI/180;
  const alt=Math.asin(Math.sin(latR)*Math.sin(decl)+Math.cos(latR)*Math.cos(decl)*Math.cos(HA));
  const az=Math.atan2(-Math.sin(HA),Math.tan(decl)*Math.cos(latR)-Math.sin(latR)*Math.cos(HA));
  return{altitude:alt*180/PI,azimuth:((az*180/PI)+360)%360,declination:decl*180/PI};
}

/* Moon phase (simplified) */
function moonPhase(date){
  const jd=toJD(date);
  const daysSinceNew=jd-2451549.5;
  const phase=daysSinceNew%29.53058867;
  const illumination=(1-Math.cos(phase*TAU/29.53058867))/2;
  const age=phase;
  const phaseName=age<1.85?'New Moon':age<7.38?'Waxing Crescent':age<9.23?'First Quarter':age<14.77?'Waxing Gibbous':age<16.62?'Full Moon':age<22.15?'Waning Gibbous':age<24?'Last Quarter':'Waning Crescent';
  return{illumination,age,phaseName,phaseNorm:age/29.53058867};
}

/* Sunset/Sunrise approximation */
function sunriseSunset(date,lat,lng){
  const jd=toJD(date);
  const T=(jd-2451545)/36525;
  const eqtime=229.18*(.000075+.001868*Math.cos(T*TAU)-.032077*Math.sin(T*TAU)-.014615*Math.cos(2*T*TAU)-.04089*Math.sin(2*T*TAU));
  const decl=23.45*Math.sin(TAU*(284+Math.floor(365.25*(date.getFullYear()+((date.getMonth()+1)-1>1?0:0)))/365)/365)*PI/180;
  const latR=lat*PI/180;
  const cosHA=(-Math.sin(latR)*decl<0?1:-1)*Math.sqrt(1-Math.pow(Math.sin(-.83*PI/180)/Math.cos(latR)/Math.cos(decl)-Math.tan(latR)*Math.tan(decl),2));
  const HA=Math.acos(cosHA)*180/PI;
  const sunrise=720-4*(lng+HA)-eqtime;
  const sunset=720-4*(lng-HA)-eqtime;
  return{
    rise:new Date(date.getTime()+(sunrise*60000-(date.getTimezoneOffset()*60000))),
    set:new Date(date.getTime()+(sunset*60000-(date.getTimezoneOffset()*60000)))
  };
}

/* Sky color based on sun altitude */
function skyColor(sunAlt){
  if(sunAlt>10)return{bg:'#0c1525',fog:'#0c1525',stage:'day'};
  if(sunAlt>2)return{bg:'#121828',fog:'#121828',stage:'twilight'};
  if(sunAlt>-2)return{bg:'#18141a',fog:'#18141a',stage:'golden'};
  if(sunAlt>-6)return{bg:'#0f0c15',fog:'#0f0c15',stage:'dusk'};
  return{bg:'#050810',fog:'#050810',stage:'night'};
}

/* Real star catalog — bright stars with real RA/Dec (simplified) */

/* Random background stars */
const bgStars=[];
for(let i=0;i<400;i++){
  bgStars.push({
    ra:Math.random()*360,
    dec:(Math.random()-.5)*160,

function drawSky(ctx,date,lat,lng,offsetX){
  const now=date;
  const sun=sunPos(now,lat,lng);
  const moonData=moonPhase(now);
  const sky=skyColor(sun.altitude);

  /* Sky gradient */
  const grad=ctx.createLinearGradient(offsetX,0,offsetX,H);
  if(sun.altitude>5){
    /* Day */
    grad.addColorStop(0,'#1a2a4a');
    grad.addColorStop(.3,'#2a4060');
    grad.addColorStop(.6,'#4a6888');
    grad.addColorStop(1,'#6a8aa8');
  }else if(sun.altitude>-2){
    /* Golden hour */
    grad.addColorStop(0,'#0a0c18');
    grad.addColorStop(.2,'#1a1420');
    grad.addColorStop(.5,'#3a2018');
    grad.addColorStop(.8,'#6a3820');
    grad.addColorStop(1,'#8a5030');
  }else if(sun.altitude>-8){
    /* Dusk */
    grad.addColorStop(0,'#060810');
    grad.addColorStop(.3,'#100e18');
    grad.addColorStop(.6,'#201820');
    grad.addColorStop(1,'#302028');
  }else{
    /* Night */
    grad.addColorStop(0,'#020408');
    grad.addColorStop(.3,'#050810');
    grad.addColorStop(.6,'#080c18');
    grad.addColorStop(1,'#0a1020');
  }
  ctx.fillStyle=grad;
  ctx.fillRect(offsetX,0,W,H);

  /* Stars — visible when sun < 0 */
  if(sun.altitude<0){
    const starBright=Math.min(1,Math.abs(sun.altitude)/8);

    /* Background stars */
    bgStars.forEach(s=>{
      const sa=s.dec*PI/180;
      const ha=(s.ra*PI/180-(now.getUTCHours()+now.getUTCMinutes()/60)*15*PI/180+lng*PI/180);
      const x=offsetX+W/2+(ha%(TAU)-PI)*W/TAU*.5;
      const y=H/2-sa*H/PI;
      if(x<offsetX-10||x>offsetX+W+10||y<-10||y>H+10)return;
      const flicker=.7+.3*Math.sin(time*2+s.flicker);
      const brightness=starBright*(1-s.mag/5)*flicker;
      if(brightness<.05)return;
      ctx.beginPath();
      ctx.arc(x,y,.5+Math.random()*.3,0,TAU);
      ctx.fillStyle=`rgba(240,235,220,${brightness})`;
      ctx.fill();
    });

    /* Catalog stars */
    starCatalog.forEach(s=>{
      const sa=s.dec*PI/180;
      const ha=(s.ra*PI/180-(now.getUTCHours()+now.getUTCMinutes()/60)*15*PI/180+lng*PI/180);
      const x=offsetX+W/2+(ha%(TAU)-PI)*W/TAU*.5;
      const y=H/2-sa*H/PI;
      if(x<offsetX-20||x>offsetX+W+20||y<-20||y>H+20)return;
      const brightness=starBright*(1-s.mag/4);
      if(brightness<.1)return;
      const sz=2+Math.max(0,(2-s.mag))*1.5;
      /* Star glow */
      const grd=ctx.createRadialGradient(x,y,0,x,y,sz*3);
      grd.addColorStop(0,`rgba(220,225,240,${brightness*.4})`);
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;
      ctx.fillRect(x-sz*3,y-sz*3,sz*6,sz*6);
      /* Star core */
      ctx.beginPath();
      ctx.arc(x,y,sz,0,TAU);
      ctx.fillStyle=`rgba(240,240,250,${brightness})`;
      ctx.fill();
    });

    /* Moon */
    if(moonData.illumination>.02){
      const moonX=offsetX+W*.7;
      const moonY=H*.2;
      const moonSz=20;
      /* Moon glow */
      const mGrd=ctx.createRadialGradient(moonX,moonY,moonSz*.5,moonX,moonY,moonSz*4);
      mGrd.addColorStop(0,`rgba(200,200,180,${moonData.illumination*.08})`);
      mGrd.addColorStop(1,'transparent');
      ctx.fillStyle=mGrd;
      ctx.fillRect(moonX-moonSz*4,moonY-moonSz*4,moonSz*8,moonSz*8);
      /* Moon body */
      ctx.beginPath();
      ctx.arc(moonX,moonY,moonSz,0,TAU);
      ctx.fillStyle=`rgba(220,220,200,${.5+moonData.illumination*.4})`;
      ctx.fill();
      /* Moon phase shadow */
      ctx.beginPath();
      ctx.arc(moonX,moonY,moonSz,0,TAU);
      ctx.fillStyle=`rgba(5,8,16,${1-moonData.illumination})`;
      ctx.fill();
    }
  }
}

/* Constellation lines — connections between stars */
const constLines=[
  [40,41],[41,42],[42,43],[43,44],/* left constellation */

/* The two special stars — Rashmi and Sharath */
const heartStars=[
  {x:.38,y:.48,r:3,bright:0,targetBright:1,name:'Rashmi',group:'heart'},
  {x:.62,y:.48,r:3,bright:0,targetBright:1,name:'Sharath',group:'heart'},

/* Thread connecting them */
let threadProgress=0;
let threadTarget=0;

/* Animation phases */
let landPhase=0;/* 0: first star, 1: more stars, 2: constellations, 3: heart stars, 4: thread, 5: zoom out, 6: title */
let landStart=performance.now();
const phaseTimings=[800,2500,4500,6500,8000,10000,12500];/* when each phase starts */

/* Camera zoom */
let zoom=1;
let zoomTarget=1;
let panX=0,panY=0;

function drawLanding(ts){
  if(phase!=='landing')return;
  const elapsed=ts-landStart;

  /* Determine current phase */
  let newPhase=0;
  for(let i=phaseTimings.length-1;i>=0;i--){
    if(elapsed>phaseTimings[i]){newPhase=i+1;break}
  }
  if(newPhase!==landPhase){
    landPhase=newPhase;
    if(landPhase===3){heartStars[0].targetBright=1;heartStars[1].targetBright=1}
    if(landPhase===4)threadTarget=1;
    if(landPhase===5){zoomTarget=.6;panX=(Math.random()-.5)*40;panY=(Math.random()-.5)*20}
    if(landPhase===6){
      $('titleBlock').style.opacity='1';
      setTimeout(()=>{$('enterBtn').style.opacity='1';$('enterBtn').classList.add('show')},1500);
    }
  }

  /* Clear */
  lCtx.fillStyle='#000';
  lCtx.fillRect(0,0,lW,lH);

  /* Apply camera transform */
  lCtx.save();
  zoom+=(zoomTarget-zoom)*.008;
  lCtx.translate(lW/2+panX,lH/2+panY);
  lCtx.scale(zoom,zoom);
  lCtx.translate(-lW/2,-lH/2);

  /* Draw background stars — appear gradually */
  const bgCount=Math.min(constellationStars.filter(s=>s.group==='bg').length,Math.floor(elapsed/60));
  constellationStars.filter(s=>s.group==='bg').slice(0,bgCount).forEach(s=>{
    const flick=.7+Math.sin(ts*.002+s.flicker)*.3;
    lCtx.fillStyle=`rgba(240,230,210,${s.bright*flick})`;
    lCtx.beginPath();
    lCtx.arc(s.x*lW,s.y*lH,s.r,0,TAU);
    lCtx.fill();
  });

  /* Draw constellation stars — appear after phase 1 */
  if(landPhase>=1){
    const cStart=phaseTimings[1];
    const cCount=Math.min(constellationStars.filter(s=>s.group==='const').length,Math.floor((elapsed-cStart)/80));
    constellationStars.filter(s=>s.group==='const').slice(0,cCount).forEach(s=>{
      const flick=.7+Math.sin(ts*.002+s.flicker)*.3;
      lCtx.fillStyle=`rgba(240,230,210,${s.bright*flick})`;
      lCtx.beginPath();
      lCtx.arc(s.x*lW,s.y*lH,s.r,0,TAU);
      lCtx.fill();
    });
  }

  /* Draw constellation lines — appear after phase 2 */
  if(landPhase>=2){
    const lStart=phaseTimings[2];
    const lProgress=Math.min(1,(elapsed-lStart)/2000);
    lCtx.strokeStyle=`rgba(200,168,85,${.08*lProgress})`;
    lCtx.lineWidth=.5;
    constLines.forEach((line,i)=>{
      if(i/constLines.length>lProgress)return;
      const a=constellationStars[line[0]],b=constellationStars[line[1]];
      if(!a||!b)return;
      lCtx.beginPath();
      lCtx.moveTo(a.x*lW,a.y*lH);
      lCtx.lineTo(b.x*lW,b.y*lH);
      lCtx.stroke();
    });
  }

  /* Draw heart stars — Rashmi and Sharath */
  heartStars.forEach(h=>{
    h.bright+=(h.targetBright-h.bright)*.015;
    if(h.bright<.01)return;
    const pulse=.8+Math.sin(ts*.002)*.2;
    /* Outer glow */
    const grad=lCtx.createRadialGradient(h.x*lW,h.y*lH,0,h.x*lW,h.y*lH,h.r*8);
    grad.addColorStop(0,`rgba(200,168,85,${h.bright*.25*pulse})`);
    grad.addColorStop(1,'rgba(200,168,85,0)');
    lCtx.fillStyle=grad;
    lCtx.beginPath();
    lCtx.arc(h.x*lW,h.y*lH,h.r*8,0,TAU);
    lCtx.fill();
    /* Core */
    lCtx.fillStyle=`rgba(255,215,100,${h.bright*pulse})`;
    lCtx.beginPath();
    lCtx.arc(h.x*lW,h.y*lH,h.r,0,TAU);
    lCtx.fill();
    /* Inner bright core */
    lCtx.fillStyle=`rgba(255,255,240,${h.bright*pulse*.8})`;
    lCtx.beginPath();
    lCtx.arc(h.x*lW,h.y*lH,h.r*.4,0,TAU);
    lCtx.fill();
  });

  /* Draw thread connecting them */
  threadProgress+=(threadTarget-threadProgress)*.012;
  if(threadProgress>.01){
    const sx=heartStars[0].x*lW,sy=heartStars[0].y*lH;
    const ex=heartStars[1].x*lW,ey=heartStars[1].y*lH;
    const mx=(sx+ex)/2,my=Math.min(sy,ey)-60;/* curve upward */
    /* Draw glowing thread */
    lCtx.strokeStyle=`rgba(200,168,85,${threadProgress*.3})`;
    lCtx.lineWidth=1.5;
    lCtx.shadowBlur=8;
    lCtx.shadowColor='rgba(200,168,85,.3)';
    lCtx.beginPath();
    lCtx.moveTo(sx,sy);
    lCtx.quadraticCurveTo(mx,my,sx+(ex-sx)*threadProgress,sy+(ey-sy)*threadProgress);
    lCtx.stroke();
    lCtx.shadowBlur=0;
    /* Travelling particle on thread */
    if(threadProgress>.1){
      const tp=(ts*.0003)%1;
      const px=sx+(ex-sx)*tp;
      const py=sy+(ey-sy)*tp-(1-tp)*tp*120;/* arc */
      lCtx.fillStyle=`rgba(200,168,85,${threadProgress*.5})`;
      lCtx.beginPath();
      lCtx.arc(px,py,2,0,TAU);
      lCtx.fill();
    }
  }

  /* Draw name labels for heart stars */
  if(landPhase>=3){
    const labelAlpha=Math.min(1,(elapsed-phaseTimings[3])/1500);
    lCtx.font='300 13px "Cormorant Garamond"';
    lCtx.fillStyle=`rgba(200,168,85,${labelAlpha*.6})`;
    lCtx.textAlign='center';
    lCtx.fillText('Rashmi ✦',heartStars[0].x*lW,heartStars[0].y*lH+28);
    lCtx.fillText('Sharath ✦',heartStars[1].x*lW,heartStars[1].y*lH+28);
  }

  lCtx.restore();

  requestAnimationFrame(drawLanding);
}

function updateMoon(){
  const now=new Date();
  const moon=moonPhase(now);
  const sun=sunPos(now,DUBLIN.lat,DUBLIN.lng);
  const visible=sun.altitude<-6;

  /* Position moon element */
  const el=$('moonEl');
  const sz=visible?28:24;
  el.style.width=sz+'px';el.style.height=sz+'px';
  el.style.borderRadius='50%';
  el.style.background=`radial-gradient(circle at ${40-moon.illumination*30}% 35%, #eee ${moon.illumination*60}%, #aaa ${40+moon.illumination*30}%, #666 100%)`;
  el.style.boxShadow=`0 0 ${visible?20:8}px rgba(200,200,180,${visible?.12:.04})`;
  el.style.top='48px';
  el.style.left='50%';
  el.style.transform='translateX(-50%)';

  /* Click handler */
  el.onclick=()=>{
    const canvas=$('moonBig');
    const ctx=canvas.getContext('2d');
    canvas.width=100;canvas.height=100;
    /* Draw big moon */
    ctx.beginPath();ctx.arc(50,50,40,0,TAU);
    const grd=ctx.createRadialGradient(50,50,0,50,50,40);
    grd.addColorStop(0,'#eee');grd.addColorStop(.7,'#ccc');grd.addColorStop(1,'#999');
    ctx.fillStyle=grd;ctx.fill();
    /* Phase shadow */
    ctx.beginPath();ctx.arc(50,50,40,0,TAU);
    ctx.fillStyle=`rgba(5,8,16,${1-moon.illumination})`;ctx.fill();

    const msgs=[
      'Tonight, the same moon hangs over Dublin and Bangalore. She looks up. He looks up. Same light. Two cities. One heart.',
      'The moon doesn\'t care about borders or time zones. It just shines. The way your love does.',
      'Some nights, the moon is all you have in common with someone far away. And somehow, that\'s enough.',
      'He can\'t hold your hand tonight. But the moonlight falling on your skin is the same light touching his.',
      'The moon waxes and wanes. So does the distance. But it always comes back to full.',
      'Between Dublin and Bangalore, there\'s a line only the moon can draw.'
    ];
    $('mDt').textContent=moon.phaseName+' · '+Math.round(moon.illumination*100)+'% illuminated';
    $('mMs').textContent=msgs[Math.floor(Math.random()*msgs.length)];
    $('moonOv').classList.add('open');
  };
}

/* Load letters from localStorage or use defaults */
function loadLetters(){
  const stored=localStorage.getItem(LETTERS_KEY);
  if(stored){
    try{return JSON.parse(stored)}catch(e){}

  /* First time: store defaults */
  localStorage.setItem(LETTERS_KEY,JSON.stringify(defaultLetters));

  const panel=$('inboxPanel');

/* ═══════════════════════════════════════════
   AMBIENT AUDIO
   ═══════════════════════════════════════════ */
let actx=null;const asnd={};
function iA(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}
function mkPiano(){if(asnd.piano)return sS('piano');iA();const o1=actx.createOscillator(),o2=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();o1.type='sine';o1.frequency.value=220;o2.type='sine';o2.frequency.value=330;f.type='lowpass';f.frequency.value=400;g.gain.value=0;o1.connect(f);o2.connect(f);f.connect(g);g.connect(actx.destination);o1.start();o2.start();g.gain.linearRampToValueAtTime(.025,actx.currentTime+2);asnd.piano={osc:[o1,o2],gain:g};document.querySelector('[data-s="piano"]').classList.add('act')}
function mkRain(){if(asnd.rain)return sS('rain');iA();const buf=actx.createBuffer(1,2*actx.sampleRate,actx.sampleRate),d=buf.getChannelData(0);let last=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;d[i]=(last+.02*w)/1.02;last=d[i];d[i]*=3.5}const n=actx.createBufferSource();n.buffer=buf;n.loop=true;const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=.5;const g=actx.createGain();g.gain.value=0;n.connect(f);f.connect(g);g.connect(actx.destination);n.start();g.gain.linearRampToValueAtTime(.035,actx.currentTime+2);asnd.rain={noise:n,gain:g};document.querySelector('[data-s="rain"]').classList.add('act')}
function mkNight(){if(asnd.night)return sS('night');iA();const o=actx.createOscillator(),o2=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=440;o2.type='triangle';o2.frequency.value=554;g.gain.value=0;o.connect(g);o2.connect(g);g.connect(actx.destination);o.start();o2.start();g.gain.linearRampToValueAtTime(.012,actx.currentTime+3);asnd.night={osc:[o,o2],gain:g};document.querySelector('[data-s="night"]').classList.add('act')}
function sS(t){const s=asnd[t];if(!s)return;if(s.gain)s.gain.gain.linearRampToValueAtTime(0,actx.currentTime+1);setTimeout(()=>{if(s.osc)(Array.isArray(s.osc)?s.osc:[s.osc]).forEach(o=>{try{o.stop()}catch(e){}});if(s.noise)try{s.noise.stop()}catch(e){}},1100);delete asnd[t];document.querySelector(`[data-s="${t}"]`)?.classList.remove('act')}
document.querySelectorAll('.ab').forEach(b=>b.addEventListener('click',()=>{const s=b.dataset.s;if(s==='piano')mkPiano();if(s==='rain')mkRain();if(s==='night')mkNight()}));

/* Photo Viewer */
let pvIdx=0;
function openPhoto(i){
  pvIdx=i;
  const p=realPhotos[i];
  const v=$('photoViewer');
  v.querySelector('img').src=p.src;
  v.querySelector('.pv-date').textContent=p.date;
  v.querySelector('.pv-caption').textContent=p.desc;
  v.querySelector('.pv-count').textContent=`${i+1} / ${realPhotos.length}`;
  v.classList.add('open');
}
function closePhoto(){$('photoViewer').classList.remove('open')}
function navPhoto(d){
  pvIdx=(pvIdx+d+realPhotos.length)%realPhotos.length;
  openPhoto(pvIdx);
}
$('photoViewer').addEventListener('click',e=>{
  if(e.target.classList.contains('pv-close')||e.target=== $('photoViewer'))closePhoto();
  if(e.target.classList.contains('pv-prev'))navPhoto(-1);
  if(e.target.classList.contains('pv-next'))navPhoto(1);
});
document.addEventListener('keydown',e=>{
  if(!$('photoViewer').classList.contains('open'))return;
  if(e.key==='Escape')closePhoto();
  if(e.key==='ArrowLeft')navPhoto(-1);
  if(e.key==='ArrowRight')navPhoto(1);
});

/* Memory Galaxy Canvas */
let memCanvas,memCtx,memStars=[],memInit=false;
function initMemGal(){
  if(memInit)return;
  memInit=true;
  memCanvas=document.createElement('canvas');
  memCanvas.width=W;memCanvas.height=H;
  $('memGal').insertBefore(memCanvas,$('memGal').querySelector('.mg-title'));
  memCtx=memCanvas.getContext('2d');
  /* Place photos as stars in a spiral */
  const cx=W/2,cy=H/2;
  memStars=realPhotos.map((p,i)=>{
    const angle=i*.618*TAU;/* golden angle */
    const r=60+i*38;
    return{x:cx+Math.cos(angle)*r,y:cy+Math.sin(angle)*r,photo:p,idx:i,pulse:Math.random()*TAU,r:3+Math.random()*2};
  });
  /* Add wedding video as special center star */
  memStars.unshift({x:cx,y:cy,photo:{src:'',date:'23 May 2025',title:'Our Wedding Video',tag:'wedding',desc:'The day we became one',isVideo:true},idx:-1,pulse:0,r:6});
}
function drawMemGal(){
  if(!$('memGal').classList.contains('open'))return;
  memCtx.clearRect(0,0,W,H);
  /* Background dust */
  for(let i=0;i<80;i++){
    const x=(Math.sin(i*73.1)*.5+.5)*W;
    const y=(Math.cos(i*41.7)*.5+.5)*H;
    memCtx.fillStyle=`rgba(200,168,85,${.02+Math.sin(time+i)*.01})`;
    memCtx.beginPath();memCtx.arc(x,y,1,0,TAU);memCtx.fill();
  }
  /* Draw connecting lines between memories */
  memCtx.strokeStyle='rgba(200,168,85,.04)';memCtx.lineWidth=.5;
  for(let i=0;i<memStars.length-1;i++){
    const a=memStars[i],b=memStars[i+1];
    memCtx.beginPath();memCtx.moveTo(a.x,a.y);memCtx.lineTo(b.x,b.y);memCtx.stroke();
  }
  /* Draw photo stars */
  memStars.forEach(s=>{
    const pulse=.6+Math.sin(time*1.5+s.pulse)*.4;
    const isHover=memHover===s.idx;
    const isWedding=s.photo.isVideo;
    /* Glow */
    const grad=memCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*(isHover?4:2.5));
    grad.addColorStop(0,`rgba(200,168,85,${isHover?.3:.12*pulse})`);
    grad.addColorStop(1,'rgba(200,168,85,0)');
    memCtx.fillStyle=grad;memCtx.beginPath();memCtx.arc(s.x,s.y,s.r*(isHover?4:2.5),0,TAU);memCtx.fill();
    /* Core */
    memCtx.fillStyle=isHover?'#f0e6d2':isWedding?`rgba(255,215,0,${.8+.2*pulse})`:`rgba(200,168,85,${.7+.3*pulse})`;
    memCtx.beginPath();memCtx.arc(s.x,s.y,s.r*(isHover?1.3:1),0,TAU);memCtx.fill();
    /* Wedding star special ring */
    if(isWedding){
      memCtx.strokeStyle=`rgba(255,215,0,${.2+.1*pulse})`;memCtx.lineWidth=1;
      memCtx.beginPath();memCtx.arc(s.x,s.y,s.r*1.8,0,TAU);memCtx.stroke();
    }
    /* Date label for hovered */
    if(isHover){
      memCtx.font='600 9px Inter';memCtx.fillStyle='rgba(200,168,85,.5)';
      memCtx.textAlign='center';memCtx.fillText(s.photo.date,s.x,s.y+s.r+14);
      memCtx.font='300 11px "Cormorant Garamond"';memCtx.fillStyle='#f0e6d2';
      memCtx.fillText(s.photo.title,s.x,s.y+s.r+28);
    }
  });
}
let memHover=-1;
function initMemEvents(){
  memCanvas.addEventListener('mousemove',e=>{
    const rect=memCanvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    memHover=-1;
    memStars.forEach(s=>{
      if(Math.hypot(mx-s.x,my-s.y)<s.r*2.5)memHover=s.idx;
    });
    memCanvas.style.cursor=memHover>=0?'pointer':'default';
  });
  memCanvas.addEventListener('click',()=>{
    if(memHover>=0){
      const s=memStars[memHover];
      if(s.photo.isVideo){
        toast('Wedding video — 23 May 2025, Coorg');
      }else{
        openPhoto(s.idx);
      }
    }
  });
}
