<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parallel Hearts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c8a855;--gold-dim:rgba(200,168,85,0.3);--warm:#f0e6d2;--ivory:rgba(240,230,210,0.45);
  --midnight:#050816;--midnight-deep:#020510;
  --aurora:#4a9eff;--aurora-dim:rgba(74,158,255,0.15);
  --silver:#b8c5d6;--silver-dim:rgba(184,197,214,0.2);
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',-apple-system,sans-serif
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--midnight-deep);color:var(--warm);font-family:var(--sans);-webkit-font-smoothing:antialiased;cursor:none}

/* ── Custom Cursor ── */
#cursor{position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:screen;transition:transform .15s cubic-bezier(.16,1,.3,1)}
#cursor .dot{width:6px;height:6px;background:var(--gold);border-radius:50%;position:absolute;top:-3px;left:-3px;transition:transform .2s,background .3s,box-shadow .3s}
#cursor .ring{width:36px;height:36px;border:1px solid rgba(200,168,85,0.35);border-radius:50%;position:absolute;top:-18px;left:-18px;transition:transform .35s cubic-bezier(.16,1,.3,1),border-color .3s,width .3s,height .3s,top .3s,left .3s,background .3s}
#cursor.hovering .dot{transform:scale(0);background:var(--aurora)}
#cursor.hovering .ring{width:56px;height:56px;top:-28px;left:-28px;border-color:rgba(74,158,255,0.5);background:rgba(74,158,255,0.04)}
#cursor.clicking .ring{transform:scale(.85)}

/* ── Cursor Trail ── */
.cursor-trail{position:fixed;pointer-events:none;z-index:9998;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;mix-blend-mode:screen}

/* ── Cursor Glow ── */
#cursorGlow{position:fixed;pointer-events:none;z-index:4;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,85,0.04) 0%,transparent 70%);transform:translate(-50%,-50%);transition:opacity .4s}
::selection{background:var(--gold);color:var(--midnight)}

#scene{position:fixed;inset:0;z-index:0}
canvas{display:block}

#vignette{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.7) 100%)}

/* ── Overlay Text ── */
#overlayText{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;pointer-events:none;opacity:0;transition:opacity 2s cubic-bezier(0.16,1,0.3,1)}
#overlayText.show{opacity:1}
#overlayText h1{font-family:var(--serif);font-size:clamp(40px,8vw,96px);font-weight:300;letter-spacing:0.02em;line-height:1.1;color:var(--warm)}
#overlayText h1 em{font-style:italic;color:var(--gold);font-weight:300}
#overlayText .tagline{font-family:var(--sans);font-size:clamp(12px,1.8vw,16px);font-weight:200;color:var(--ivory);letter-spacing:0.12em;margin-top:20px}
#overlayText .enter-prompt{margin-top:48px;font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(200,168,85,0.35);animation:breathe 3s ease-in-out infinite;cursor:pointer;pointer-events:auto}
@keyframes breathe{0%,100%{opacity:0.25}50%{opacity:0.7}}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:8;display:flex;justify-content:space-between;align-items:flex-start;padding:24px 32px;opacity:0;transition:opacity 1.5s;pointer-events:none}
#hud.show{opacity:1;pointer-events:auto}
.hud-city{text-align:right}
.hud-city:first-child{text-align:left}
.hud-city .city-name{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,168,85,0.35);font-weight:300}
.hud-city .city-time{font-family:var(--serif);font-size:clamp(18px,2.5vw,28px);font-weight:300;color:var(--warm);letter-spacing:0.02em}
.hud-city .city-weather{font-size:10px;color:var(--silver-dim);margin-top:2px;letter-spacing:0.08em}
.hud-center{text-align:center}
.hud-center .countdown-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,168,85,0.3);font-weight:300}
.hud-center .countdown-val{font-family:var(--serif);font-size:14px;color:rgba(240,230,210,0.4);margin-top:2px}

/* ── Scene Label ── */
#sceneLabel{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;opacity:0;transition:opacity 1.5s cubic-bezier(0.16,1,0.3,1);pointer-events:none;text-align:center}
#sceneLabel.show{opacity:1}
.sl-name{font-family:var(--serif);font-size:clamp(14px,2vw,18px);font-weight:300;color:var(--gold);letter-spacing:0.06em}
.sl-hint{font-size:10px;color:rgba(240,230,210,0.25);margin-top:6px;letter-spacing:0.15em;font-weight:300}

/* ── Thinking of You ── */
#thinkBtn{position:fixed;bottom:40px;right:32px;z-index:10;width:44px;height:44px;border-radius:50%;border:1px solid rgba(200,168,85,0.15);background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.5s cubic-bezier(0.16,1,0.3,1);font-size:16px}
#thinkBtn.show{opacity:0.5}
#thinkBtn:hover{opacity:1;border-color:rgba(200,168,85,0.4);transform:scale(1.08)}
#thinkBtn.sent{animation:heartPulse 1s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes heartPulse{0%{transform:scale(1)}30%{transform:scale(1.3);box-shadow:0 0 30px rgba(200,168,85,0.3)}100%{transform:scale(1)}}

/* ── Toast ── */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);z-index:20;background:rgba(5,8,22,0.92);backdrop-filter:blur(24px);border:1px solid rgba(200,168,85,0.15);border-radius:16px;padding:20px 32px;text-align:center;opacity:0;pointer-events:none;transition:all 0.6s cubic-bezier(0.16,1,0.3,1)}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast-icon{font-size:24px;margin-bottom:8px}
.toast-text{font-family:var(--serif);font-size:16px;color:var(--warm);font-weight:300}

/* ── Letter Modal ── */
#letterOverlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(5,8,22,0.9);backdrop-filter:blur(16px);opacity:0;visibility:hidden;transition:all 0.8s cubic-bezier(0.16,1,0.3,1)}
#letterOverlay.open{opacity:1;visibility:visible}
.letter-envelope{width:min(440px,90vw);background:linear-gradient(145deg,rgba(15,18,30,0.95),rgba(10,12,25,0.98));border:1px solid rgba(200,168,85,0.1);border-radius:20px;padding:36px;transform:translateY(30px);transition:transform 0.8s cubic-bezier(0.16,1,0.3,1);position:relative}
#letterOverlay.open .letter-envelope{transform:translateY(0)}
.letter-envelope::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.letter-envelope h3{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--gold);margin-bottom:16px}
.letter-envelope textarea{width:100%;min-height:160px;border:none;background:transparent;color:var(--warm);font-family:var(--serif);font-size:17px;line-height:1.8;resize:none;outline:none}
.letter-envelope textarea::placeholder{color:rgba(240,230,210,0.15);font-style:italic}
.letter-actions{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.04)}
.letter-count{font-size:10px;color:rgba(240,230,210,0.3);letter-spacing:0.08em}
.letter-send{padding:8px 20px;border:1px solid rgba(200,168,85,0.2);border-radius:24px;background:rgba(200,168,85,0.05);color:var(--gold);font-family:var(--sans);font-size:11px;font-weight:400;cursor:pointer;transition:all 0.4s;letter-spacing:0.06em}
.letter-send:hover{background:rgba(200,168,85,0.12);border-color:rgba(200,168,85,0.4)}
.letter-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:rgba(240,230,210,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}

/* ── Audio Controls ── */
#audioControls{position:fixed;bottom:40px;left:32px;z-index:10;display:flex;gap:8px;opacity:0;transition:opacity 1.5s;pointer-events:none}
#audioControls.show{opacity:1;pointer-events:auto}
.audio-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(200,168,85,0.12);background:rgba(255,255,255,0.02);backdrop-filter:blur(12px);color:var(--silver);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.audio-btn:hover{border-color:rgba(200,168,85,0.3);color:var(--gold)}
.audio-btn.active{background:rgba(200,168,85,0.08);border-color:rgba(200,168,85,0.25);color:var(--gold)}

/* ── Scene Navigation ── */
#sceneNav{position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:12px;opacity:0;transition:opacity 1.5s;pointer-events:none}
#sceneNav.show{opacity:1;pointer-events:auto}
.scene-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(200,168,85,0.2);background:transparent;cursor:pointer;transition:all 0.4s}
.scene-dot:hover{border-color:rgba(200,168,85,0.5);transform:scale(1.3)}
.scene-dot.active{background:var(--gold);border-color:var(--gold)}

@media(max-width:768px){
  #hud{padding:16px 20px}
  .hud-center{display:none}
  #thinkBtn{bottom:24px;right:20px;width:38px;height:38px}
  #sceneLabel{bottom:24px}
  #sceneNav{right:12px;gap:8px}
  #audioControls{bottom:24px;left:20px}
}
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div id="vignette"></div>

<div id="cursor"><div class="dot"></div><div class="ring"></div></div>
<div id="cursorGlow"></div>

<div id="overlayText">
  <h1 id="titleText"></h1>
  <div class="tagline" id="tagline"></div>
  <div class="enter-prompt" id="enterPrompt">Enter Our World</div>
</div>

<div id="hud">
  <div class="hud-city"><div class="city-name">Dublin</div><div class="city-time" id="clockDublin">--:--</div><div class="city-weather" id="weatherDublin"></div></div>
  <div class="hud-center"><div class="countdown-label">Until we meet</div><div class="countdown-val" id="countdown"></div></div>
  <div class="hud-city"><div class="city-name">Bangalore</div><div class="city-time" id="clockBangalore">--:--</div><div class="city-weather" id="weatherBangalore"></div></div>
</div>

<div id="sceneLabel"><div class="sl-name" id="slName"></div><div class="sl-hint" id="slHint"></div></div>

<div id="sceneNav">
  <div class="scene-dot active" data-scene="arrival" title="Arrival"></div>
  <div class="scene-dot" data-scene="glasshouse" title="The Glasshouse"></div>
  <div class="scene-dot" data-scene="observatory" title="Observatory"></div>
  <div class="scene-dot" data-scene="library" title="Library"></div>
  <div class="scene-dot" data-scene="memoryGalaxy" title="Memory Galaxy"></div>
  <div class="scene-dot" data-scene="balcony" title="Balcony"></div>
</div>

<button id="thinkBtn" title="Thinking of you">&#9825;</button>

<div id="toast"><div class="toast-icon" id="toastIcon"></div><div class="toast-text" id="toastText"></div></div>

<div id="letterOverlay">
  <div class="letter-envelope">
    <button class="letter-close" onclick="closeLetter()">&#10005;</button>
    <h3 id="letterTitle">Write a Letter</h3>
    <textarea id="letterText" placeholder="Write something from the heart..."></textarea>
    <div class="letter-actions">
      <span class="letter-count" id="letterCount">0 / 250 words</span>
      <button class="letter-send" onclick="sendLetter()">Send with love</button>
    </div>
  </div>
</div>

<div id="audioControls">
  <button class="audio-btn" data-sound="piano" title="Piano">&#9835;</button>
  <button class="audio-btn" data-sound="rain" title="Rain">&#9729;</button>
  <button class="audio-btn" data-sound="night" title="Night Sounds">&#9789;</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>
<script type="module">
import*as THREE from'three';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';
import{ShaderPass}from'three/addons/postprocessing/ShaderPass.js';

const $=id=>document.getElementById(id);
const PI=Math.PI,TAU=PI*2;
let W=window.innerWidth,H=window.innerHeight;
let time=0,delta=0;
let sceneState='arrival';
let entered=false,locked=false;

/* ═══════════════════════════════════════════
   THREE.JS SETUP
   ═══════════════════════════════════════════ */
const renderer=new THREE.WebGLRenderer({canvas:$('scene'),antialias:true,powerPreference:'high-performance'});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.7;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const cam=new THREE.PerspectiveCamera(50,W/H,0.1,500);
cam.position.set(0,1.7,8);

const sc=new THREE.Scene();
sc.background=new THREE.Color(0x050816);
sc.fog=new THREE.FogExp2(0x050816,0.012);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(sc,cam));
const bloom=new UnrealBloomPass(new THREE.Vector2(W,H),0.5,0.4,0.85);
composer.addPass(bloom);
const vignetteShader={uniforms:{tDiffuse:{value:null}},vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,fragmentShader:`uniform sampler2D tDiffuse;varying vec2 vUv;void main(){vec4 t=texture2D(tDiffuse,vUv);vec2 u=(vUv-.5)*1.1;float v=1.-dot(u,u);t.rgb*=smoothstep(0.,1.,v/1.3);gl_FragColor=t;}`};
composer.addPass(new ShaderPass(vignetteShader));

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
   ═══════════════════════════════════════════ */
const cursorEl=$('cursor');
const cursorGlow=$('cursorGlow');
let mouseX=W/2,mouseY=H/2;
let cursorX=W/2,cursorY=H/2;
let isHovering=false;

/* Trail particles */
const trailCount=12;
const trails=[];
for(let i=0;i<trailCount;i++){
  const t=document.createElement('div');
  t.className='cursor-trail';
  t.style.width=`${3-i*.2}px`;
  t.style.height=`${3-i*.2}px`;
  document.body.appendChild(t);
  trails.push({el:t,x:W/2,y:H/2});
}
const trailPos=trails.map(()=>({x:W/2,y:H/2}));

document.addEventListener('mousemove',e=>{
  mouseX=e.clientX;mouseY=e.clientY;
  cursorGlow.style.left=mouseX+'px';
  cursorGlow.style.top=mouseY+'px';
});

document.addEventListener('mousedown',()=>cursorEl.classList.add('clicking'));
document.addEventListener('mouseup',()=>cursorEl.classList.remove('clicking'));

/* Detect hoverable elements */
function checkHover(){
  const els=document.querySelectorAll('button,a,.scene-dot,.audio-btn,#enterPrompt,.letter-send,.letter-close');
  let hovering=false;
  els.forEach(el=>{
    const r=el.getBoundingClientRect();
    if(mouseX>=r.left-10&&mouseX<=r.right+10&&mouseY>=r.top-10&&mouseY<=r.bottom+10)hovering=true;
  });
  if(hovering!==isHovering){
    isHovering=hovering;
    cursorEl.classList.toggle('hovering',hovering);
  }
}

function updateCursor(){
  /* Smooth follow */
  const ease=.12;
  cursorX+=(mouseX-cursorX)*ease;
  cursorY+=(mouseY-cursorY)*ease;
  cursorEl.style.transform=`translate(${cursorX}px,${cursorY}px)`;

  /* Trail */
  for(let i=0;i<trailCount;i++){
    const prev=i===0?{x:cursorX,y:cursorY}:trailPos[i-1];
    const t=trails[i];
    const ease2=.15-i*.008;
    trailPos[i].x+=(prev.x-trailPos[i].x)*ease2;
    trailPos[i].y+=(prev.y-trailPos[i].y)*ease2;
    t.el.style.transform=`translate(${trailPos[i].x-2}px,${trailPos[i].y-2}px)`;
    t.el.style.opacity=(1-i/trailCount)*.3;
  }

  checkHover();
  requestAnimationFrame(updateCursor);
}
updateCursor();

/* ═══════════════════════════════════════════
   MATERIALS — Premium Palette
   ═══════════════════════════════════════════ */
const M={
  concrete:new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:.92}),
  concreteDark:new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:.95}),
  glass:new THREE.MeshPhysicalMaterial({color:0x4a9eff,transmission:.85,roughness:.05,thickness:.02,ior:1.5,transparent:true,opacity:.25}),
  glassFrost:new THREE.MeshPhysicalMaterial({color:0xb8c5d6,transmission:.6,roughness:.3,thickness:.05,transparent:true,opacity:.4}),
  wood:new THREE.MeshStandardMaterial({color:0x5a3a20,roughness:.8}),
  woodLight:new THREE.MeshStandardMaterial({color:0x7a5a3a,roughness:.75}),
  metal:new THREE.MeshStandardMaterial({color:0x222222,roughness:.3,metalness:.85}),
  metalWarm:new THREE.MeshStandardMaterial({color:0x8a7050,roughness:.4,metalness:.6}),
  bark:new THREE.MeshStandardMaterial({color:0x2d1b0f,roughness:.95}),
  leaf:new THREE.MeshStandardMaterial({color:0x3a6030,roughness:.7,side:THREE.DoubleSide}),
  leafBright:new THREE.MeshStandardMaterial({color:0x5a8a40,roughness:.65,side:THREE.DoubleSide}),
  paper:new THREE.MeshStandardMaterial({color:0xf0e6d0,roughness:.9}),
  glow:new THREE.MeshStandardMaterial({color:0xffcc66,emissive:0xffcc66,emissiveIntensity:2}),
  bookA:new THREE.MeshStandardMaterial({color:0x8b2500,roughness:.8}),
  bookB:new THREE.MeshStandardMaterial({color:0x1a3a5a,roughness:.8}),
  bookC:new THREE.MeshStandardMaterial({color:0x2a4a2a,roughness:.8}),
  bookD:new THREE.MeshStandardMaterial({color:0x5a3a1a,roughness:.8}),
  water:new THREE.MeshPhysicalMaterial({color:0x1a2a3a,roughness:.05,metalness:.1,transmission:.7,transparent:true,opacity:.55}),
  starGlow:new THREE.MeshBasicMaterial({color:0xffeedd,transparent:true,opacity:.6,blending:THREE.AdditiveBlending,depthWrite:false}),
  aurora:new THREE.MeshBasicMaterial({color:0x4a9eff,transparent:true,opacity:.15,blending:THREE.AdditiveBlending,depthWrite:false}),
};

/* ═══════════════════════════════════════════
   LIGHTING
   ═══════════════════════════════════════════ */
sc.add(new THREE.AmbientLight(0x0a0a1a,.12));
const moonDir=new THREE.DirectionalLight(0x8899cc,.35);
moonDir.position.set(-15,20,-10);
moonDir.castShadow=true;
moonDir.shadow.mapSize.set(2048,2048);
moonDir.shadow.camera.near=.5;moonDir.shadow.camera.far=60;
moonDir.shadow.camera.left=-20;moonDir.shadow.camera.right=20;
moonDir.shadow.camera.top=20;moonDir.shadow.camera.bottom=-20;
moonDir.shadow.bias=-.0005;
sc.add(moonDir);

const lantern=new THREE.PointLight(0xffaa44,1.8,12,1.5);
lantern.position.set(2.5,2.8,1);lantern.castShadow=true;
lantern.shadow.mapSize.set(512,512);
sc.add(lantern);
const lanternGlow=new THREE.PointLight(0xffcc66,.4,8,2);
lanternGlow.position.set(2.5,3.2,1);sc.add(lanternGlow);
const treeLight=new THREE.PointLight(0x66aa55,.25,10,2);
treeLight.position.set(0,4,0);sc.add(treeLight);

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
function bx(w,h,d,mat,p,s=true){const g=new THREE.BoxGeometry(w,h,d),m=new THREE.Mesh(g,mat);if(p)m.position.copy(p);m.castShadow=s;m.receiveShadow=s;return m}
function cy(rT,rB,h,mat,p,s=12){const g=new THREE.CylinderGeometry(rT,rB,h,s),m=new THREE.Mesh(g,mat);if(p)m.position.copy(p);m.castShadow=true;m.receiveShadow=true;return m}

const world=new THREE.Group();sc.add(world);

/* ═══════════════════════════════════════════
   SCENE 1: ARRIVAL
   ═══════════════════════════════════════════ */
const arrivalStars=[];
for(let i=0;i<800;i++){
  arrivalStars.push({x:(Math.random()-.5)*2,y:(Math.random()-.5)*2,r:Math.random()*1.5+.3,a:Math.random()*.8+.2,ts:Math.random()*.02+.005,to:Math.random()*TAU});
}
const dublinPos={x:-.28,y:.05};
const bangalorePos={x:.32,y:.15};

function drawArrival(ctx,t){
  ctx.clearRect(0,0,W,H);
  for(const s of arrivalStars){
    const a=s.a*(.5+.5*Math.sin(t*s.ts+s.to));
    ctx.beginPath();ctx.arc((s.x*.5+.5)*W,(s.y*.5+.5)*H,s.r,0,TAU);
    ctx.fillStyle=`rgba(240,230,210,${a})`;ctx.fill();
    if(s.r>1.2){ctx.beginPath();ctx.arc((s.x*.5+.5)*W,(s.y*.5+.5)*H,s.r*3,0,TAU);ctx.fillStyle=`rgba(200,168,85,${a*.06})`;ctx.fill()}
  }
  const dx1=(dublinPos.x*.5+.5)*W,dy1=(dublinPos.y*.5+.5)*H;
  const dx2=(bangalorePos.x*.5+.5)*W,dy2=(bangalorePos.y*.5+.5)*H;
  const cpx=W*.5,cpy=H*.35;
  const arcProgress=Math.min(1,Math.max(0,(t-1.5)/2));
  if(arcProgress>0){
    ctx.beginPath();ctx.moveTo(dx1,dy1);
    const steps=60,endStep=Math.floor(steps*arcProgress);
    for(let i=1;i<=endStep;i++){const frac=i/steps;ctx.lineTo((1-frac)*(1-frac)*dx1+2*(1-frac)*frac*cpx+frac*frac*dx2,(1-frac)*(1-frac)*dy1+2*(1-frac)*frac*cpy+frac*frac*dy2)}
    ctx.strokeStyle=`rgba(200,168,85,${.15+.1*Math.sin(t*2)})`;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.moveTo(dx1,dy1);
    for(let i=1;i<=endStep;i++){const frac=i/steps;ctx.lineTo((1-frac)*(1-frac)*dx1+2*(1-frac)*frac*cpx+frac*frac*dx2,(1-frac)*(1-frac)*dy1+2*(1-frac)*frac*cpy+frac*frac*dy2)}
    ctx.strokeStyle=`rgba(200,168,85,${.04+.03*Math.sin(t*2)})`;ctx.lineWidth=6;ctx.stroke();
  }
  const dotPulse=.5+.5*Math.sin(t*1.5);
  [{pos:dublinPos,name:'Dublin'},{pos:bangalorePos,name:'Bangalore'}].forEach(city=>{
    const cx=(city.pos.x*.5+.5)*W,cy=(city.pos.y*.5+.5)*H;
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,20);
    grad.addColorStop(0,`rgba(200,168,85,${.12*dotPulse})`);grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(cx-20,cy-20,40,40);
    ctx.beginPath();ctx.arc(cx,cy,3,0,TAU);ctx.fillStyle=`rgba(200,168,85,${.6+.3*dotPulse})`;ctx.fill();
    ctx.font='300 10px Inter, sans-serif';ctx.fillStyle=`rgba(200,168,85,${.3+.2*dotPulse})`;ctx.textAlign='center';
    ctx.fillText(city.name,cx,cy+16);
  });
}

function buildTree(){
  const t=new THREE.Group();
  for(let i=0;i<8;i++){
    const f=i/8;
    t.add(cy(.18*(1-f*.6),.22*(1-f*.6),.5+f*.2,M.bark,new THREE.Vector3(Math.sin(f*.3)*.08,.25+i*.45,Math.cos(f*.2)*.04)));
  }
  [[[-.05,3.2,0],[-1,.3,-.2],2.2,.06],[[.05,3,.05],[1,.4,-.1],2,.055],[[.03,3.5,-.05],[-.8,.5,.6],1.8,.045],[[-.02,3.4,.03],[.6,-.7,-.5],1.6,.04],[[0,3.7,0],[-.3,.8,.4],1.4,.035]].forEach(b=>{
    const dir=new THREE.Vector3(...b[1]).normalize();
    const org=new THREE.Vector3(...b[0]);
    for(let i=0;i<4;i++){
      const f=i/4;const p=org.clone().add(dir.clone().multiplyScalar(f*b[2]));
      const s=cy(b[3]*.8*(1-f*.5),b[3]*(1-f*.5),b[2]/4,M.bark,p);
      s.lookAt(p.clone().add(dir));s.rotateX(PI/2);t.add(s);
    }
    const tip=org.clone().add(dir.clone().multiplyScalar(b[2]));
    for(let j=0;j<5;j++){
      const ls=.12+Math.random()*.1;
      const lg=new THREE.SphereGeometry(ls,6,4);lg.scale(1,.4,1);
      const m=(Math.random()>.3?M.leaf:M.leafBright).clone();
      m.color.offsetHSL(0,0,(Math.random()-.5)*.15);
      const lf=new THREE.Mesh(lg,m);
      lf.position.copy(tip).add(new THREE.Vector3((Math.random()-.5)*.5,(Math.random()-.3)*.4,(Math.random()-.5)*.5));
      lf.rotation.set(Math.random()*PI,Math.random()*PI,0);lf.castShadow=true;
      lf.userData.sway={s:.3+Math.random()*.4,o:Math.random()*TAU,a:.015+Math.random()*.02};
      t.add(lf);
    }
  });
  for(let i=0;i<35;i++){
    const a=Math.random()*TAU,r=.5+Math.random()*1.8,h=3.2+Math.random()*1.5;
    const ls=.06+Math.random()*.08;
    const lg=new THREE.SphereGeometry(ls,5,3);lg.scale(1,.35,1);
    const m=(Math.random()>.4?M.leaf:M.leafBright).clone();
    m.color.offsetHSL(0,0,(Math.random()-.5)*.2);
    const lf=new THREE.Mesh(lg,m);
    lf.position.set(Math.cos(a)*r,h,Math.sin(a)*r);
    lf.rotation.set(Math.random()*PI,Math.random()*PI,0);lf.castShadow=true;
    lf.userData.sway={s:.2+Math.random()*.3,o:Math.random()*TAU,a:.01+Math.random()*.02};
    t.add(lf);
  }
  for(let i=0;i<5;i++){
    const a=(i/5)*TAU+Math.random()*.3;
    const r=new THREE.Mesh(new THREE.CylinderGeometry(.02,.04,.5+Math.random()*.3,5),M.bark);
    r.position.set(Math.cos(a)*.25,.1,Math.sin(a)*.25);
    r.rotation.z=Math.cos(a)*.6;r.rotation.x=Math.sin(a)*.6;r.castShadow=true;t.add(r);
  }
  for(let i=0;i<2;i++){
    const ring=new THREE.Mesh(new THREE.TorusGeometry(.25+i*.04,.008,8,32),new THREE.MeshStandardMaterial({color:0xc8a855,emissive:0xc8a855,emissiveIntensity:.3,transparent:true,opacity:.4-i*.1}));
    ring.position.y=.15+i*.08;ring.rotation.x=PI/2;t.add(ring);
  }
  return t;
}

let currentPrompt=null,promptTimer=null;
function showOverlay(title,sub,dur=5000){
  const el=$('overlayText');
  $('titleText').innerHTML=title;
  $('tagline').textContent=sub||'';
  $('enterPrompt').style.display='none';
  el.classList.add('show');
  clearTimeout(promptTimer);
  promptTimer=setTimeout(()=>el.classList.remove('show'),dur);
}
function showPrompt(data){
  if(currentPrompt===data.text)return;
  currentPrompt=data.text;
  showOverlay(data.text,data.attr,6000);
}
function hidePrompt(){currentPrompt=null}

const scenes=['arrival','glasshouse','observatory','library','memoryGalaxy','balcony'];
const sceneNames={arrival:'Arrival',glasshouse:'The Glasshouse',observatory:'Observatory',library:'The Library',memoryGalaxy:'Memory Galaxy',balcony:'The Balcony'};

function transitionTo(newScene){
  const old=sceneState;
  sceneState=newScene;

  /* Hide scene nav dots */
  document.querySelectorAll('.scene-dot').forEach(d=>d.classList.toggle('active',d.dataset.scene===newScene));

  if(newScene==='arrival'){
    arrivalAlpha=1;arrivalCanvas.style.opacity='1';
    entered=false;
    world.visible=false;
    $('hud').classList.remove('show');
    $('thinkBtn').classList.remove('show');
    $('audioControls').classList.remove('show');
  }
  else if(newScene==='glasshouse'){
    arrivalAlpha=0;arrivalCanvas.style.opacity='0';arrivalCanvas.style.transition='opacity 2s';
    entered=true;world.visible=true;
    observatory.visible=false;library.visible=false;memoryGalaxy.visible=false;balcony.visible=false;
    renderer.domElement.requestPointerLock();
    setTimeout(()=>{showOverlay('Welcome home.','',4000)},2000);
    setTimeout(()=>{$('hud').classList.add('show');$('thinkBtn').classList.add('show');$('audioControls').classList.add('show');$('sceneLabel').classList.add('show');
      $('slName').textContent=sceneNames[newScene];
      $('slHint').textContent='WASD to move · mouse to look';
      setTimeout(()=>$('sceneLabel').classList.remove('show'),6000);
    },4500);
  }
  else{
    arrivalAlpha=0;arrivalCanvas.style.opacity='0';arrivalCanvas.style.transition='opacity 1s';
    world.visible=true;
    observatory.visible=newScene==='observatory';
    library.visible=newScene==='library';
    memoryGalaxy.visible=newScene==='memoryGalaxy';
    balcony.visible=newScene==='balcony';

    /* Reset camera for new scene */
    if(newScene==='observatory'){cam.position.set(0,2,5);yaw=PI;pitch=0}
    if(newScene==='library'){cam.position.set(0,1.5,3);yaw=PI;pitch=0}
    if(newScene==='memoryGalaxy'){cam.position.set(0,1.5,4);yaw=PI;pitch=0}
    if(newScene==='balcony'){cam.position.set(0,1.5,2);yaw=PI;pitch=0}

    setTimeout(()=>{$('sceneLabel').classList.add('show');
      $('slName').textContent=sceneNames[newScene];
      $('slHint').textContent='WASD to move · mouse to look';
      setTimeout(()=>$('sceneLabel').classList.remove('show'),6000);
    },1000);
  }
}

/* ═══════════════════════════════════════════
   UPDATE
   ═══════════════════════════════════════════ */
const clock=new THREE.Clock();
function update(){
  delta=Math.min(clock.getDelta(),.05);
  time+=delta;
  if(!entered)return;

  /* Movement */
  const md=new THREE.Vector3();
  if(keys.KeyW||keys.ArrowUp)md.z-=1;
  if(keys.KeyS||keys.ArrowDown)md.z+=1;
  if(keys.KeyA||keys.ArrowLeft)md.x-=1;
  if(keys.KeyD||keys.ArrowRight)md.x+=1;
  md.normalize();
  const sinY=Math.sin(yaw),cosY=Math.cos(yaw);
  const wd=new THREE.Vector3(md.x*cosY-md.z*sinY,0,md.x*sinY+md.z*cosY);
  vel.lerp(wd.multiplyScalar(4),delta*8);
  playerPos.add(vel.clone().multiplyScalar(delta));
  playerPos.x=Math.max(bounds.xMin,Math.min(bounds.xMax,playerPos.x));
  playerPos.z=Math.max(bounds.zMin,Math.min(bounds.zMax,playerPos.z));

  const moving=md.length()>.01;
  if(moving){headBob.ph+=delta*8;headBob.am=THREE.MathUtils.lerp(headBob.am,.04,delta*5)}
  else headBob.am=THREE.MathUtils.lerp(headBob.am,0,delta*3);

  const ct=new THREE.Vector3(playerPos.x,playerPos.y+Math.sin(headBob.ph)*headBob.am,playerPos.z);
  cam.position.lerp(ct,delta*12);
  cam.rotation.order='YXZ';cam.rotation.y=yaw;cam.rotation.x=pitch;
  cam.rotation.z=Math.sin(time*.3)*.003;

  /* Fireflies */
  const fp=ffGeo.attributes.position;
  for(let i=0;i<ffN;i++){
    const f=ffData[i];
    f.wa+=(Math.random()-.5)*.1;
    f.vel.x+=Math.cos(f.wa)*.02;f.vel.z+=Math.sin(f.wa)*.02;
    f.vel.y+=Math.sin(time*f.sp+f.ph)*.01;f.vel.multiplyScalar(.98);
    let nx=fp.getX(i)+f.vel.x*delta,ny=fp.getY(i)+f.vel.y*delta,nz=fp.getZ(i)+f.vel.z*delta;
    if(Math.abs(nx)>6)f.vel.x*=-1;if(ny<.3||ny>3.5)f.vel.y*=-1;if(Math.abs(nz)>5)f.vel.z*=-1;
    fp.setXYZ(i,nx,ny,nz);
  }
  fp.needsUpdate=true;ffMat.uniforms.time.value=time;

  /* Rain */
  const rp=rnGeo.attributes.position;
  for(let i=0;i<rnN;i++){
    let y=rp.getY(i)-rnVel[i]*delta;
    if(y<0){y=8+Math.random()*4;rp.setX(i,playerPos.x+(Math.random()-.5)*20);rp.setZ(i,playerPos.z+(Math.random()-.5)*20)}
    rp.setY(i,y);rp.setX(i,rp.getX(i)+Math.sin(time+i)*.02);
  }
  rp.needsUpdate=true;

  /* Leaves */
  lvData.forEach(l=>{const f=l.userData.falling;f.v.x+=Math.sin(time*.5+f.wp)*.005;l.position.add(f.v.clone().multiplyScalar(delta));l.rotation.x+=f.r.x*delta;l.rotation.y+=f.r.y*delta;l.rotation.z+=f.r.z*delta;if(l.position.y<.1)l.position.set((Math.random()-.5)*6,f.ry,(Math.random()-.5)*.4)});

  /* Tree sway */
  tree.children.forEach(c=>{if(c.userData.sway){const s=c.userData.sway;c.rotation.z=Math.sin(time*s.s+s.o)*s.a}});

  /* Water */
  waterFeature.children[1].material.roughness=.05+Math.sin(time*.8)*.02;

  /* Lantern flicker */
  lantern.intensity=1.8+Math.sin(time*3)*.15+Math.sin(time*7)*.05;
  lanternGlow.intensity=.4+Math.sin(time*2)*.05;

  /* Steam */
  bench.traverse(c=>{if(c.userData.steam){const s=c.userData.steam;c.position.y=.09+Math.sin(time*s.s+s.o)*.015+.025;c.material.opacity=.04+Math.sin(time*s.s+s.o)*.03}});

  /* Memory stars */
  memMat.uniforms.time.value=time;

  /* Observatory globe rotation */
  if(observatory.visible){
    globeWire.rotation.y=time*.1;
    obsStarMat.uniforms.time.value=time;
  }

  /* Library floating letters */
  if(library.visible){
    library.children.forEach(c=>{if(c.userData.floating){const f=c.userData.floating;c.position.y=1+Math.sin(time*f.sp+f.ph)*f.amp}});
  }

  /* Memory galaxy particles */
  if(memoryGalaxy.visible){
    coreOrb.material.opacity=.2+.1*Math.sin(time);
    memPartMat.uniforms.time.value=time;
  }

  /* Balcony moon glow pulse */
  if(balcony.visible){
    balconyMoonGlow.material.uniforms&&0;
  }

  /* Gaze interaction */
  ray.setFromCamera(new THREE.Vector2(0,0),cam);
  let hit=null,minD=Infinity;
  if(sceneState==='glasshouse'){
    interactives.forEach(obj=>{const h=ray.intersectObject(obj,true);if(h.length&&h[0].distance<minD&&h[0].distance<6){minD=h[0].distance;hit=obj}});
  }
  if(hit&&hit.userData.interact)showPrompt(hit.userData.interact);
  else hidePrompt();
}

}

window.closeLetter=()=>{$('letterOverlay').classList.remove('open')};
window.sendLetter=()=>{
  const text=$('letterText').value.trim();
  if(!text)return;
  const words=text.split(/\s+/).filter(Boolean).length;
  if(words>250){alert('Keep it under 250 words.');return}
  const letters=JSON.parse(localStorage.getItem('ph_letters')||'[]');

/* ═══════════════════════════════════════════
   AMBIENT AUDIO — Web Audio API
   ═══════════════════════════════════════════ */
let audioCtx=null;
const activeSounds={};

function initAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}

function createPianoAmbient(){
  if(activeSounds.piano)return stopSound('piano');
  initAudio();
  const osc1=audioCtx.createOscillator();
  const osc2=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const filter=audioCtx.createBiquadFilter();

  osc1.type='sine';osc1.frequency.value=220;
  osc2.type='sine';osc2.frequency.value=330;
  filter.type='lowpass';filter.frequency.value=400;
  gain.gain.value=0;

  osc1.connect(filter);osc2.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);
  osc1.start();osc2.start();

  /* Gentle fade in */
  gain.gain.linearRampToValueAtTime(0.03,audioCtx.currentTime+2);

  /* Slow frequency modulation */
  const lfo=audioCtx.createOscillator();
  const lfoGain=audioCtx.createGain();
  lfo.frequency.value=0.1;lfoGain.gain.value=20;
  lfo.connect(lfoGain);lfoGain.connect(osc1.frequency);
  lfo.start();

  activeSounds.piano={osc:[osc1,osc2],gain,lfo,lfoGain,filter};
  document.querySelector('[data-sound="piano"]').classList.add('active');
}

function createRainAmbient(){
  if(activeSounds.rain)return stopSound('rain');
  initAudio();

  /* Brown noise for rain */
  const bufferSize=2*audioCtx.sampleRate;
  const noiseBuffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  const output=noiseBuffer.getChannelData(0);
  let lastOut=0;
  for(let i=0;i<bufferSize;i++){
    const white=Math.random()*2-1;
    output[i]=(lastOut+(0.02*white))/1.02;
    lastOut=output[i];
    output[i]*=3.5;
  }

  const noise=audioCtx.createBufferSource();
  noise.buffer=noiseBuffer;noise.loop=true;
  const filter=audioCtx.createBiquadFilter();
  filter.type='bandpass';filter.frequency.value=800;filter.Q.value=0.5;
  const gain=audioCtx.createGain();
  gain.gain.value=0;

  noise.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);
  noise.start();

  gain.gain.linearRampToValueAtTime(0.04,audioCtx.currentTime+2);
  activeSounds.rain={noise,gain,filter};
  document.querySelector('[data-sound="rain"]').classList.add('active');
}

function createNightAmbient(){
  if(activeSounds.night)return stopSound('night');
  initAudio();

  /* Gentle wind/chimes */
  const osc=audioCtx.createOscillator();
  const osc2=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const filter=audioCtx.createBiquadFilter();

  osc.type='sine';osc.frequency.value=440;
  osc2.type='triangle';osc2.frequency.value=554;
  filter.type='lowpass';filter.frequency.value=600;
  gain.gain.value=0;

  osc.connect(filter);osc2.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);
  osc.start();osc2.start();

  gain.gain.linearRampToValueAtTime(0.015,audioCtx.currentTime+3);

  /* Random chime effects */
  const chimeInterval=setInterval(()=>{
    if(!activeSounds.night){clearInterval(chimeInterval);return}
    const freq=[440,554,659,880][Math.floor(Math.random()*4)];
    osc.frequency.linearRampToValueAtTime(freq,audioCtx.currentTime+0.5);
  },3000+Math.random()*4000);

  activeSounds.night={osc,osc2,gain,filter,chimeInterval};
  document.querySelector('[data-sound="night"]').classList.add('active');
}

function stopSound(type){
  const s=activeSounds[type];
  if(!s)return;
  if(s.gain)s.gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1);
  setTimeout(()=>{
    if(s.osc){(Array.isArray(s.osc)?s.osc:[s.osc]).forEach(o=>{try{o.stop()}catch(e){}})}
    if(s.lfo)try{s.lfo.stop()}catch(e){}
    if(s.noise)try{s.noise.stop()}catch(e){}
    if(s.chimeInterval)clearInterval(s.chimeInterval);
  },1100);
  delete activeSounds[type];
  document.querySelector(`[data-sound="${type}"]`)?.classList.remove('active');
}

document.querySelectorAll('.audio-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const sound=btn.dataset.sound;
    if(sound==='piano')createPianoAmbient();
    if(sound==='rain')createRainAmbient();
    if(sound==='night')createNightAmbient();
  });
});
